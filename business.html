   ============================================================ */
function findEntry(id){ return state.finance.find(function(x){return x.id===id;}); }

document.addEventListener('click',function(e){
  var el=e.target.closest('[data-action]');
  if(!el) return;
  var action=el.getAttribute('data-action');
  var id=el.getAttribute('data-id');

  /* navigation & shell */
  if(action==='nav'){ nav(el.getAttribute('data-route')); byId('sidebar').classList.remove('open'); byId('scrim').classList.remove('show'); return; }
  if(action==='open-sidebar'){ byId('sidebar').classList.add('open'); byId('scrim').classList.add('show'); return; }
  if(action==='close-sidebar'){ byId('sidebar').classList.remove('open'); byId('scrim').classList.remove('show'); return; }
  if(action==='toggle-theme'){ toggleTheme(); return; }
  if(action==='close-modal'){ closeModal(); return; }
  if(action==='close-modal-overlay'){ if(e.target===el) closeModal(); return; }

  /* finance */
  if(action==='open-entry-modal'){ entryModal(); return; }
  if(action==='edit-entry'){ var en=findEntry(id); if(en) entryModal(en); return; }
  if(action==='delete-entry'){
    var en2=findEntry(id);
    if(en2&&confirm('Delete this '+en2.type+' of '+fmtMoney(en2.amount)+'?')){
      state.finance=state.finance.filter(function(x){return x.id!==id;});
      commit(); toast('Entry deleted.','warn');
    } return;
  }
  if(action==='finance-tab'){ ui.financeTab=el.getAttribute('data-tab'); render(); return; }
  if(action==='entry-type'){
    var form=el.closest('form');
    if(form){
      var draft={
        id:fv(form,'id')||undefined,
        type:el.getAttribute('data-val'),
        amount:num(fv(form,'amount'))||'',
        date:fv(form,'date'),
        note:fv(form,'note'),
        client:fv(form,'client')
      };
      ui.entryFormType=draft.type;
      entryModal(draft.id?Object.assign({},findEntry(draft.id),draft):draft);
      if(!draft.id){ /* keep as new entry */ }
    }
    return;
  }

  /* goals */
  if(action==='open-goal-modal'){ goalModal(); return; }
  if(action==='goal-filter'){ ui.goalFilter=el.getAttribute('data-val'); render(); return; }
  if(action==='edit-goal'){ var g=state.goals.find(function(x){return x.id===id;}); if(g) goalModal(g); return; }
  if(action==='delete-goal'){
    var g2=state.goals.find(function(x){return x.id===id;});
    if(g2&&confirm('Delete goal "'+g2.title+'"?')){
      state.goals=state.goals.filter(function(x){return x.id!==id;});
      commit(); toast('Goal deleted.','warn');
    } return;
  }
  if(action==='complete-goal'){
    var g3=state.goals.find(function(x){return x.id===id;});
    if(g3){ g3.done=true; g3.completedAt=todayISO(); commit(); toast('🎉 Goal completed: '+g3.title); } return;
  }
  if(action==='reopen-goal'){
    var g4=state.goals.find(function(x){return x.id===id;});
    if(g4){ g4.done=false; commit(); toast('Goal reopened.'); } return;
  }
  if(action==='update-goal-progress'){
    var g5=state.goals.find(function(x){return x.id===id;});
    if(g5) updateGoalProgressModal(g5); return;
  }
  if(action==='toggle-goal-step'){
    var g6=state.goals.find(function(x){return x.id===el.getAttribute('data-goal');});
    if(g6){
      var st=(g6.steps||[]).find(function(s){return s.id===el.getAttribute('data-step');});
      if(st){ st.done=!st.done; commit(); }
    } return;
  }

  /* roadmap */
  if(action==='open-phase-modal'){ phaseModal(); return; }
  if(action==='edit-phase'){ var p=state.phases.find(function(x){return x.id===id;}); if(p) phaseModal(p); return; }
  if(action==='delete-phase'){
    var p2=state.phases.find(function(x){return x.id===id;});
    if(p2&&confirm('Delete phase "'+p2.name+'" and its '+(p2.tasks||[]).length+' task(s)?')){
      state.phases=state.phases.filter(function(x){return x.id!==id;});
      commit(); toast('Phase deleted.','warn');
    } return;
  }
  if(action==='open-phase-task-modal'){ phaseTaskModal(el.getAttribute('data-phase')); return; }
  if(action==='edit-phase-task'){
    var p3=state.phases.find(function(x){return x.id===el.getAttribute('data-phase');});
    if(p3){ var pt=(p3.tasks||[]).find(function(t){return t.id===el.getAttribute('data-task');});
      if(pt) phaseTaskModal(p3.id,pt); } return;
  }
  if(action==='delete-phase-task'){
    var p4=state.phases.find(function(x){return x.id===el.getAttribute('data-phase');});
    if(p4){
      var tid=el.getAttribute('data-task');
      var ptt=(p4.tasks||[]).find(function(t){return t.id===tid;});
      if(ptt&&confirm('Delete roadmap task "'+ptt.title+'"?')){
        p4.tasks=p4.tasks.filter(function(t){return t.id!==tid;});
        commit(); toast('Roadmap task deleted.','warn');
      }
    } return;
  }

  /* tasks */
  if(action==='open-task-modal'){ taskModal(); return; }
  if(action==='edit-task'){ var t=state.tasks.find(function(x){return x.id===id;}); if(t) taskModal(t); return; }
  if(action==='delete-task'){
    var t2=state.tasks.find(function(x){return x.id===id;});
    if(t2&&confirm('Delete task "'+t2.title+'"?')){
      state.tasks=state.tasks.filter(function(x){return x.id!==id;});
      commit(); toast('Task deleted.','warn');
    } return;
  }
  if(action==='toggle-task'){
    var t3=state.tasks.find(function(x){return x.id===id;});
    if(t3){ t3.done=!t3.done; t3.completedAt=t3.done?todayISO():null; commit(); if(t3.done) toast('Nice — task done.'); } return;
  }
  if(action==='task-filter-status'){ ui.taskFilter.status=el.getAttribute('data-val'); render(); return; }
  if(action==='task-filter-priority'){ ui.taskFilter.priority=el.getAttribute('data-val'); render(); return; }
  if(action==='task-filter-bucket'){ ui.taskFilter.bucket=el.getAttribute('data-val'); render(); return; }

  /* notes */
  if(action==='toggle-pin'){
    e.stopPropagation();
    var n=state.notes.find(function(x){return x.id===id;});
    if(n){ n.pinned=!n.pinned; commit(); } return;
  }
  if(action==='delete-note'){
    e.stopPropagation();
    var n2=state.notes.find(function(x){return x.id===id;});
    if(n2&&confirm('Delete note "'+n2.title+'"?')){
      state.notes=state.notes.filter(function(x){return x.id!==id;});
      commit(); toast('Note deleted.','warn');
    } return;
  }
  if(action==='open-note-modal'){
    var n3=id?state.notes.find(function(x){return x.id===id;}):null;
    noteModal(n3); return;
  }
  if(action==='note-filter-cat'){ ui.noteFilter.category=el.getAttribute('data-val'); render(); return; }

  /* clients */
  if(action==='open-client-modal'){ clientModal(); return; }
  if(action==='edit-client'){ var c=state.clients.find(function(x){return x.id===id;}); if(c) clientModal(c); return; }
  if(action==='delete-client'){
    var c2=state.clients.find(function(x){return x.id===id;});
    if(c2&&confirm('Delete client "'+c2.name+'"?')){
      state.clients=state.clients.filter(function(x){return x.id!==id;});
      commit(); toast('Client deleted.','warn');
    } return;
  }
  if(action==='client-filter'){ ui.clientFilter=el.getAttribute('data-val'); render(); return; }

  /* reviews */
  if(action==='toggle-weekly'){
    var wk=state.reviews.weekly, cw=isoWeek();
    if(wk.week!==cw){ wk.week=cw; wk.items={}; }
    var idx=el.getAttribute('data-idx');
    wk.items[idx]=!wk.items[idx];
    commit(); return;
  }
  if(action==='delete-decision'){
    state.reviews.decisions=state.reviews.decisions.filter(function(x){return x.id!==id;});
    commit(); toast('Decision removed.','warn'); return;
  }

  /* metrics */
  if(action==='clear-metric'){
    delete state.metrics[el.getAttribute('data-key')];
    commit(); toast('Saved metric cleared.'); return;
  }

  /* data management */
  if(action==='export-data'){ exportData(); return; }
  if(action==='import-data'){ byId('import-file').click(); return; }
  if(action==='reset-data'){ resetData(); return; }
  if(action==='load-sample'){
    if(state.finance.length===0||confirm('Loading sample data replaces your current data. Continue?')) loadSampleData();
    return;
  }
});

/* form submissions */
document.addEventListener('submit',function(e){
  var form=e.target;
  e.preventDefault();

  if(form.id==='modal-form'){
    if(modalSubmitHandler){
      var ok=modalSubmitHandler(form);
      if(ok!==false){ closeModal(); commit(); }
    } else closeModal();
    return;
  }
  var calcKey=form.getAttribute('data-calc');
  if(calcKey){ runCalculator(calcKey,form); return; }

  var mCalc=form.getAttribute('data-metric-calc');
  if(mCalc){
    var def=METRIC_DEFS.find(function(d){return d.key===mCalc;});
    if(def&&def.calc){
      var g=function(n){ return num(form.elements[n]?form.elements[n].value:0); };
      var v=def.calc.fn(g);
      if(v==null||isNaN(v)||!isFinite(v)){ toast('Check the inputs — the result is not a valid number.','error'); return; }
      state.metrics[mCalc]={value:Math.round(v*100)/100,updatedAt:new Date().toISOString()};
      commit();
      toast(def.name+' saved: '+fmtMetric(def,v));
    }
    return;
  }
  var mSet=form.getAttribute('data-metric-set');
  if(mSet){
    var def2=METRIC_DEFS.find(function(d){return d.key===mSet;});
    var v2=num(form.elements['val'].value);
    state.metrics[mSet]={value:v2,updatedAt:new Date().toISOString()};
    commit();
    toast((def2?def2.name:'Metric')+' saved.');
    return;
  }

  var kind=form.getAttribute('data-form');
  if(kind==='quick-task'){
    var title=fv(form,'title');
    if(!title){ toast('Type a task first.','warn'); return; }
    state.tasks.push({id:uid(),title:title,deadline:fv(form,'deadline'),priority:fv(form,'priority'),bucket:fv(form,'bucket'),done:false,createdAt:todayISO()});
    commit(); toast('Task added.');
    return;
  }
  if(kind==='monthly-review'){
    var mo=fv(form,'month');
    state.reviews.monthly[mo]={
      wins:form.elements['wins'].value,
      problems:form.elements['problems'].value,
      lessons:form.elements['lessons'].value,
      focus:form.elements['focus'].value,
      savedAt:new Date().toISOString()
    };
    commit(); toast('Monthly review for '+monthLabel(mo)+' saved.');
    return;
  }
  if(kind==='decision'){
    var txt=fv(form,'text');
    if(!txt) return;
    state.reviews.decisions.push({id:uid(),text:txt,date:todayISO()});
    commit(); toast('Decision logged.');
    return;
  }
  if(kind==='settings'){
    state.settings.businessName=fv(form,'businessName')||'My Business';
    state.settings.currency=fv(form,'currency')||'₱';
    state.settings.taxRate=clamp(num(fv(form,'taxRate')),0,60);
    state.settings.monthlyTarget=Math.max(0,num(fv(form,'monthlyTarget')));
    commit(); toast('Settings saved.');
    return;
  }
});

    state.reviews.swot[swotKey]=el.value;
    save();
    toast('SWOT saved.');
    return;
  }
  /* backup file import */
  if(el.id==='import-file'){
    if(el.files&&el.files[0]) importData(el.files[0]);
    el.value='';
    return;
  }
});

/* keyboard: Escape closes modal / sidebar */
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    if(byId('modal-root').innerHTML) closeModal();
    byId('sidebar').classList.remove('open');
    byId('scrim').classList.remove('show');
  }
});

window.addEventListener('hashchange',render);

/* ============================================================
   init
   ============================================================ */
loadState();
applyTheme();
render();

/* backup reminder — once per session if data exists and backup is stale */
(function(){
  var records=state.finance.length+state.notes.length+state.goals.length+state.tasks.length;
  if(records<10) return;
  var lb=state.settings.lastBackup;
  var stale=!lb||daysUntil(lb)<=-7;
  if(stale){
    setTimeout(function(){
      toast(lb?'Your last backup was over a week ago — export a fresh one from Settings.':'Tip: your data lives only in this browser. Export a JSON backup from Settings & Data.','warn');
    },1800);
  }
})();
</script>
</body>
</html>
