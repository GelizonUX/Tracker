    statCard('Last updated',lastMetricUpdate()||'—','','','clock')+
  '</div>';
  html+='<div class="grid grid-3 mt-lg">';
  METRIC_DEFS.forEach(function(d){
    var mv=metricValue(d);
    var st=mv?d.evaluate(mv.value):null;
    var stBadge=mv?'<span class="badge '+(st==='good'?'good':(st==='warn'?'warn':'risk'))+'">'+(st==='good'?'Healthy':(st==='warn'?'Watch':'Risky'))+'</span>':'<span class="badge neutral">Not tracked</span>';

      '<div style="flex:1;min-width:0"><b style="font-size:.92rem">'+esc(d.name)+'</b><div style="margin-top:2px">'+stBadge+(mv&&mv.src==='auto'?' <span class="badge accent">auto</span>':'')+'</div></div></div>'+
      '<div class="m-val">'+(mv?fmtMetric(d,mv.value):'—')+'</div>'+
      (mv&&mv.date?'<div style="font-size:.7rem;color:var(--text-3)">updated '+fmtDate(mv.date.slice(0,10))+'</div>':'')+
      '<div class="m-explain"><b style="font-size:.76rem">What it means:</b> '+esc(d.explain)+'<br><b style="font-size:.76rem">Healthy range:</b> '+esc(d.healthy)+'</div>';

      html+='<details class="calc"><summary>Calculate & save</summary><div class="calc-body"><form data-metric-calc="'+d.key+'">'+
        d.calc.fields.map(function(f){ return '<div class="field"><label>'+esc(f[1])+'</label><input class="input" type="number" step="any" name="'+f[0]+'" required></div>'; }).join('')+
        '<button type="submit" class="btn btn-primary btn-sm">'+icon('calc')+' Calculate & save</button></form></div></details>';
    } else {
      html+='<details class="calc"><summary>Enter value manually</summary><div class="calc-body"><form data-metric-set="'+d.key+'">'+

    }
    if(state.metrics[d.key]) html+='<button class="btn btn-sm btn-ghost mt" data-action="clear-metric" data-key="'+d.key+'" style="margin-top:8px">'+icon('x')+' Clear saved value</button>';
    html+='</div>';
  });
  html+='</div>';
  return html;

function lastMetricUpdate(){
  var latest=null;
  Object.keys(state.metrics).forEach(function(k){ var u=state.metrics[k].updatedAt; if(u&&(!latest||u>latest)) latest=u; });
  return latest?fmtDate(latest.slice(0,10)):null;
}

function isoWeek(){

function goalModal(goal){

    '<div class="field"><label>Deadline</label><input class="input" type="date" name="deadline" value="'+esc(goal.deadline||'')+'"></div></div>'+
    '<div class="field"><label>Action steps (one per line)</label><textarea class="input" name="steps" rows="4" placeholder="Step 1…\nStep 2…">'+esc(stepsText)+'</textarea></div>';
  openModal(isEdit?'Edit goal':'New goal',body,{onSubmit:function(form){
    var title=fv(form,'title');

    if(!title){ toast('Give the goal a title.','error'); return false; }
    if(target<=0){ toast('Set a target greater than zero.','error'); return false; }

      var match=existingSteps.find(function(s){return s.text===text;});
      return match||{id:uid(),text:text,done:false};

    var data={title:title,type:fv(form,'type'),target:target,unit:fv(form,'unit'),startDate:fv(form,'startDate'),deadline:fv(form,'deadline'),priority:fv(form,'priority'),steps:steps};

      toast('Goal created. Go get it!');
    }
    return true;
  }});
}

function exportData(){
  try{
    var blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
    var a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='bizpilot-backup-'+todayISO()+'.json';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function(){ URL.revokeObjectURL(a.href); },2000);
    state.settings.lastBackup=todayISO();
    commit();
    toast('Backup exported — keep it somewhere safe.');
  }catch(e){ toast('Export failed: '+e.message,'error'); }
}
function importData(file){
  var reader=new FileReader();
  reader.onload=function(){
    try{
      var data=JSON.parse(reader.result);
      if(!data||typeof data!=='object'||!data.settings||(!Array.isArray(data.finance))) throw new Error('This file is not a BizPilot backup.');
      state=deepMerge(JSON.parse(JSON.stringify(DEFAULT_STATE)),data);
      state.settings.onboarded=true;
      commit();
      applyTheme();
      toast('Backup imported — '+state.finance.length+' finance entries restored.');
    }catch(e){
      toast('Import failed: '+e.message,'error');
    }
  };
  reader.onerror=function(){ toast('Could not read the file.','error'); };
  reader.readAsText(file);
}
function resetData(){
  var body='<p style="font-size:.88rem;color:var(--text-2);margin-bottom:12px">This permanently deletes <b>everything</b> — finance entries, goals, roadmap, tasks, notes, clients, metrics and reviews. There is no undo.</p>'+
    '<div class="field"><label>Type <b>DELETE</b> to confirm</label><input class="input" name="confirm" placeholder="DELETE" autocomplete="off"></div>';
  openModal('Reset all data',body,{submitLabel:'Erase everything',onSubmit:function(form){
    if(fv(form,'confirm')!=='DELETE'){ toast('Type DELETE (in capitals) to confirm.','warn'); return false; }
    var theme=state.settings.theme;
    state=JSON.parse(JSON.stringify(DEFAULT_STATE));
    state.meta.createdAt=todayISO();
    state.settings.theme=theme;
    toast('All data erased. Fresh start!','warn');
    return true;
  }});
}

function applyTheme(){
  var t=state.settings.theme;
  if(!t) t=(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';
  document.documentElement.setAttribute('data-theme',t);
  applyAccent();
}
var ACCENTS=['#6366f1','#0ea5e9','#10b981','#f59e0b','#ef4444','#ec4899','#8b5cf6','#14b8a6'];
function applyAccent(){
  var c=state.settings.accent;
  var rootStyle=document.documentElement.style;
  if(!c){
    rootStyle.removeProperty('--accent');rootStyle.removeProperty('--accent-2');
    rootStyle.removeProperty('--accent-soft');rootStyle.removeProperty('--accent-grad');
    return;
  }
  rootStyle.setProperty('--accent',c);
  rootStyle.setProperty('--accent-2',c);
  rootStyle.setProperty('--accent-soft',c+'1f');
  rootStyle.setProperty('--accent-grad','linear-gradient(135deg,'+c+','+c+'cc)');
}
function toggleTheme(){
  var cur=document.documentElement.getAttribute('data-theme');
  state.settings.theme=cur==='dark'?'light':'dark';
  save();
  applyTheme();
  render();
}

/* form submissions */
document.addEventListener('submit',function(e){
  var form=e.target;
  e.preventDefault();

  /* form.getAttribute('id') — NOT form.id — because a control named "id"
     shadows the form's id property in real browsers (LegacyOverrideBuiltIns) */
  if(form.getAttribute('id')==='modal-form'){
    if(modalSubmitHandler){
      var ok;
      try{ ok=modalSubmitHandler(form); }
      catch(err){ console.error(err); toast('Save failed: '+(err&&err.message?err.message:'unexpected error')+'. Please report this.','error'); return; }
      if(ok!==false){ closeModal(); commit(); flashSaved(); }
    } else closeModal();
    return;
  }
  var calcKey=form.getAttribute('data-calc');
  if(calcKey){ runCalculator(calcKey,form); return; }

  var mCalc=form.getAttribute('data-metric-calc');
  if(mCalc){
    var def=METRIC_DEFS.find(function(d){return d.key===mCalc;});
    if(def&&def.calc){
      var g=function(n){ return num(form.elements[n]?form.elements[n].value:0); };
      var v=def.calc.fn(g);
      if(v==null||isNaN(v)||!isFinite(v)){ toast('Check the inputs — the result is not a valid number.','error'); return; }
      state.metrics[mCalc]={value:Math.round(v*100)/100,updatedAt:new Date().toISOString()};
      commit();
      toast(def.name+' saved: '+fmtMetric(def,v));
    }
    return;
  }
  var mSet=form.getAttribute('data-metric-set');
  if(mSet){
    var def2=METRIC_DEFS.find(function(d){return d.key===mSet;});
    var v2=num(form.elements['val'].value);
    state.metrics[mSet]={value:v2,updatedAt:new Date().toISOString()};
    commit();
    toast((def2?def2.name:'Metric')+' saved.');
    return;
  }

  var kind=form.getAttribute('data-form');
  if(kind==='quick-task'){
    var title=fv(form,'title');
    if(!title){ toast('Type a task first.','warn'); return; }
    state.tasks.push({id:uid(),title:title,deadline:fv(form,'deadline'),priority:fv(form,'priority'),bucket:fv(form,'bucket'),done:false,createdAt:todayISO()});
    commit(); toast('Task added.');
    return;
  }
  if(kind==='monthly-review'){
    var mo=fv(form,'month');
    state.reviews.monthly[mo]={
      wins:form.elements['wins'].value,
      problems:form.elements['problems'].value,
      lessons:form.elements['lessons'].value,
      focus:form.elements['focus'].value,
      savedAt:new Date().toISOString()
    };
    commit(); toast('Monthly review for '+monthLabel(mo)+' saved.');
    return;
  }
  if(kind==='decision'){
    var txt=fv(form,'text');
    if(!txt) return;
    state.reviews.decisions.push({id:uid(),text:txt,date:todayISO()});
    commit(); toast('Decision logged.');
    return;
  }
  if(kind==='settings'){
    state.settings.businessName=fv(form,'businessName')||'My Business';
    state.settings.currency=fv(form,'currency')||'₱';
    state.settings.taxRate=clamp(num(fv(form,'taxRate')),0,60);
    state.settings.monthlyTarget=Math.max(0,num(fv(form,'monthlyTarget')));
    state.settings.autoBackupDays=num(fv(form,'autoBackupDays'));
    state.settings.lang=fv(form,'lang')||'en';
    state.settings.payQR=form.elements['payQR']?form.elements['payQR'].value:'';
    state.settings.payQRLabel=fv(form,'payQRLabel');
    commit(); toast(state.settings.lang==='tl'?'Na-save na! Taglish mode activated. 🇵🇭':'Settings saved.');
    return;
  }
});

function daysInMonthKey(k){ var p=k.split('-'); return new Date(+p[0],+p[1],0).getDate(); }

/* ---------- recurring entries ---------- */
function processRecurring(){
  var posted=0, cur=thisMonthKey();
  (state.recurring||[]).forEach(function(r){
    if(!r.active) return;
    var m=r.lastPosted?shiftMonth(r.lastPosted,1):(r.startMonth||cur);
    var guard=0;
    while(m<=cur&&guard<36){
      var day=Math.min(r.day||1,daysInMonthKey(m));
      state.finance.push({id:uid(),type:r.type,amount:r.amount,date:m+'-'+String(day).padStart(2,'0'),category:r.category||'Other',note:(r.note||'Recurring')+' ↻',client:r.client||'',offer:r.offer||''});
      r.lastPosted=m; posted++; m=shiftMonth(m,1); guard++;
    }
  });
  if(posted){
    save();
    render();
    setTimeout(function(){ toast(posted+' recurring entr'+(posted>1?'ies':'y')+' posted automatically.'); },600);
  }
}

/* ---------- invoices & receivables ---------- */
function receivablesSummary(){
  var unpaid=(state.invoices||[]).filter(function(iv){ return iv.status!=='Paid'; });
  var overdue=unpaid.filter(function(iv){ var d=daysUntil(iv.dueDate); return iv.status==='Sent'&&d!=null&&d<0; });
  return {
    count:unpaid.length,
    total:sum(unpaid,invPHP),
    overdueCount:overdue.length,
    overdueTotal:sum(overdue,invPHP),
    top:unpaid.slice().sort(function(a,b){return invPHP(b)-invPHP(a);}).slice(0,2)
  };
}
function invoiceBadge(iv){
  if(iv.status==='Paid') return '<span class="badge good">Paid'+(iv.paidDate?' '+fmtDate(iv.paidDate):'')+'</span>';
  if(iv.status==='Sent'){
    var d=daysUntil(iv.dueDate);
    if(d!=null&&d<0) return '<span class="badge risk">Overdue '+Math.abs(d)+'d</span>';
    return '<span class="badge info">Sent · due '+(d===0?'today':(d!=null?d+'d':'—'))+'</span>';
  }
  return '<span class="badge neutral">Draft</span>';
}
function nextInvoiceNumber(){
  var max=0;
  (state.invoices||[]).forEach(function(iv){
    var m=/(\d+)\s*$/.exec(iv.number||'');

  return 'INV-'+String(max+1).padStart(4,'0');
}

function invPHP(iv){
  if(!iv.currency||iv.currency==='PHP') return iv.amount;
  return Math.round(iv.amount*(iv.fxRate||fxRateFor(iv.currency))*100)/100;
}
function fmtInvAmt(iv){
  var sym=FX_SYMBOLS[iv.currency||'PHP']||'';
  return sym+Number(iv.amount).toLocaleString(undefined,{maximumFractionDigits:2});
}
function recordInvoiceIncome(iv){
  state.finance.push({id:uid(),type:'income',amount:invPHP(iv),date:iv.paidDate||todayISO(),category:'Sales',
    note:'Invoice '+iv.number+(iv.desc?' — '+iv.desc:'')+(iv.currency&&iv.currency!=='PHP'?' ('+fmtInvAmt(iv)+' via '+(iv.payMethod||'—')+')':(iv.payMethod?' via '+iv.payMethod:'')),
    client:iv.client,offer:'',account:accountForMethod(iv.payMethod)});
}

/* ---------- monthly report ---------- */
function viewReport(){
  var mm=monthlyMap();
  var monthsAvail=sortedMonths();
  if(monthsAvail.indexOf(thisMonthKey())<0) monthsAvail.push(thisMonthKey());
  monthsAvail.sort();
  var selected=ui.reportMonth||thisMonthKey();
  if(monthsAvail.indexOf(selected)<0) selected=monthsAvail[monthsAvail.length-1];
  var period=ui.reportPeriod||'month';
  if(period==='year') return viewYearReport();
  var html=topbar('Reports','P&L summaries — print any of them or save as PDF.',
    '<button class="btn btn-primary" data-action="print-report" data-month="'+selected+'">'+icon('print')+'<span class="btn-txt">Print / Save PDF</span></button>');
  html+='<div class="card"><div class="card-head"><div class="seg">'+
    '<button class="active" data-action="report-period" data-val="month">Monthly</button>'+
    '<button data-action="report-period" data-val="year">Yearly</button></div>'+
    '<span class="spacer"></span>'+
    '<select class="input" style="width:auto" data-action-change="report-month">'+
    monthsAvail.slice().reverse().map(function(k){return '<option value="'+k+'"'+(selected===k?' selected':'')+'>'+monthLabel(k)+'</option>';}).join('')+'</select></div>';
  var d=mm[selected]||{revenue:0,expenses:0};
  var prev=mm[shiftMonth(selected,-1)]||{revenue:0,expenses:0};

/* ---------- cloud sync (Firebase Realtime Database via REST) ---------- */
function cloudEndpoint(){
  var s=state.settings.sync||{};
  if(!s.url) return null;
  var path=(s.path||'bizpilot').replace(/^\/+|\/+$/g,'');
  return s.url.replace(/\/+$/,'')+'/'+path+'.json';
}
var cloudTimer=null,cloudBusy=false;
function scheduleCloudPush(){
  var s=state.settings&&state.settings.sync;
  if(!s||!s.enabled||!s.url) return;
  clearTimeout(cloudTimer);
  cloudTimer=setTimeout(function(){ cloudPush(true); },4000);
}
var cloudConflictWarned=false;
function cloudPush(silent){
  var ep=cloudEndpoint();
  if(!ep){ if(!silent) toast('Enter your database URL first, then save sync settings.','warn'); return; }
  if(cloudBusy) return;
  cloudBusy=true;
  // conflict guard: don't silently overwrite newer changes from another device
  fetch(ep.replace(/\.json$/,'/meta.json')).then(function(r){ return r.ok?r.json():null; }).catch(function(){ return null; })
  .then(function(cloudMeta){
    if(cloudMeta&&cloudMeta.updatedAt&&cloudMeta.deviceId&&cloudMeta.deviceId!==DEVICE_ID&&cloudMeta.updatedAt>(state.settings.sync.lastSyncStamp||0)){
      cloudBusy=false;
      if(silent){
        if(!cloudConflictWarned){ cloudConflictWarned=true; toast('Cloud has newer changes from another device — auto-push paused. Go to Settings → Cloud sync to Pull (or Push to overwrite).','warn'); }
        return;
      }
      if(!confirm('The cloud copy has NEWER changes from another device. Overwrite it with THIS device’s data?')){ return; }
    }
    cloudBusy=true;
    doCloudPut(ep,silent);
  });
}
function doCloudPut(ep,silent){
  fetch(ep,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(state)})
    .then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status+((r.status===401||r.status===403)?' — your Firebase database rules denied the write. Open Firebase console → Realtime Database → Rules.':''));
      state.settings.sync.lastSync=new Date().toISOString();
      state.settings.sync.lastSyncStamp=state.meta.updatedAt;
      cloudConflictWarned=false;
      try{ localStorage.setItem(LS_KEY,JSON.stringify(state)); }catch(_){}
      if(!silent){ toast('Pushed to cloud ✓'); render(); }
    })
    .catch(function(e){ if(!silent) toast('Cloud push failed: '+e.message,'error'); })
    .finally(function(){ cloudBusy=false; });
}
function cloudPull(){
  var ep=cloudEndpoint();
  if(!ep){ toast('Enter your database URL first, then save sync settings.','warn'); return; }
  fetch(ep)
    .then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status+((r.status===401||r.status===403)?' — your Firebase database rules denied the read.':''));
      return r.json();
    })
    .then(function(data){
      if(!data||typeof data!=='object'||!data.settings){ toast('No BizPilot data found in the cloud yet — push first.','warn'); return; }
      if(!confirm('Replace the data on THIS device with the cloud copy? Local changes not yet pushed will be lost.')) return;
      if(state.meta&&state.meta.updatedAt&&data.meta&&data.meta.updatedAt&&state.meta.updatedAt>data.meta.updatedAt){
        if(!confirm('Heads up: THIS device has newer changes than the cloud copy. Pulling will lose them. Continue?')) return;
      }
      var sync=JSON.parse(JSON.stringify(state.settings.sync));
      state=deepMerge(JSON.parse(JSON.stringify(DEFAULT_STATE)),data);
      state.settings.sync=Object.assign(state.settings.sync||{},sync,{lastSync:new Date().toISOString(),lastSyncStamp:(data.meta&&data.meta.updatedAt)||Date.now()});
      try{ localStorage.setItem(LS_KEY,JSON.stringify(state)); }catch(_){}
      applyTheme(); render();
      toast('Pulled from cloud — '+state.finance.length+' finance entries on this device now.');
    })
    .catch(function(e){ toast('Cloud pull failed: '+e.message,'error'); });
}
function cloudSyncCardHTML(){
  var s=state.settings.sync||{};
  var html='<div class="card"><div class="card-head"><h3>'+icon('cloud',16)+' Cloud sync</h3><span class="spacer"></span>'+
    (s.enabled?'<span class="badge good">Auto-sync on</span>':'<span class="badge neutral">Off</span>')+'</div>'+
    '<p style="font-size:.8rem;color:var(--text-2);margin-bottom:12px">Sync your data to your own Firebase Realtime Database so it survives browser resets and follows you across devices. '+

/* ---------- auto-backup ---------- */
function autoBackupCheck(){
  var days=state.settings.autoBackupDays||0;
  if(!days) return;
  var last=state.settings.lastAutoBackup||state.settings.lastBackup;
  var since=last?-daysUntil(last):null;
  if(last&&since!==null&&since<days) return;
  setTimeout(function(){
    exportData();
    state.settings.lastAutoBackup=todayISO();
    save();
    toast('Automatic backup downloaded (every '+days+' days).');
  },1500);
}

/* ---------- orders & delivery ---------- */
var ORDER_STATUSES=['Pending','Preparing','For Delivery','Delivered','Cancelled'];
function orderTotal(o){
  return sum(o.items||[],function(it){return it.qty*it.price;})+(o.shipFee||0)-(o.discount||0);
}
function nextOrderNumber(){
  var max=0;
  (state.orders||[]).forEach(function(o){ var m=/(\d+)\s*$/.exec(o.number||''); if(m) max=Math.max(max,parseInt(m[1],10)); });
  return 'ORD-'+String(max+1).padStart(4,'0');
}
function applyOrderStock(o,sign){
  (o.items||[]).forEach(function(it){
    var p=findProduct(it.productId);
    if(p) p.stock-=sign*it.qty;
  });
}
function accountForMethod(method){
  if(!method) return '';
  var m=method.toLowerCase();
  var hit=(state.accounts||[]).find(function(a){ return (a.name||'').toLowerCase().indexOf(m)>=0; });
  if(!hit&&m==='cash') hit=(state.accounts||[]).find(function(a){ return a.type==='Cash'; });
  if(!hit&&(m==='bank transfer'||m==='card')) hit=(state.accounts||[]).find(function(a){ return a.type==='Bank'; });
  if(!hit&&m==='gcash') hit=(state.accounts||[]).find(function(a){ return a.type==='E-wallet'; });
  return hit?hit.id:'';
}
function recordOrderIncome(o){
  if(o.incomeRecorded) return;
  state.finance.push({id:uid(),type:'income',amount:orderTotal(o),date:todayISO(),category:'Sales',note:'Order '+o.number+' ('+(o.items||[]).map(function(it){return it.name+'×'+it.qty;}).join(', ')+')',client:o.clientName||'',offer:'',account:accountForMethod(o.payMethod)});
  o.incomeRecorded=true;
  ensureClient(o);
}
function ensureClient(o){
  if(!o.clientName) return;
  var exists=state.clients.some(function(c){return (c.name||'').toLowerCase()===o.clientName.toLowerCase();});
  if(!exists){
    state.clients.push({id:uid(),name:o.clientName,status:'Active',contact:o.contact||'',value:0,note:'Added automatically from order '+o.number,createdAt:todayISO()});
  }
}

var CM_ICONS=['notes','box','clients','flag','spark','cash','truck','calc','metrics','goals'];
var CM_TYPES=[['text','Text'],['number','Number'],['money','Money'],['date','Date'],['select','Dropdown'],['check','Checkbox'],['image','Photo / file']];
function findModule(id){ return (state.customModules||[]).find(function(m){return m.id===id;}); }
function cmFormatCell(f,v){
  if(v==null||v==='') return '—';
  if(f.type==='image'){
    if(typeof v==='object'&&v&&v.data){
      if((v.data||'').indexOf('data:image')===0) return '<img class="img-thumb" src="'+v.data+'" alt="">';
      return '<a href="'+v.data+'" download="'+esc(v.name||'file')+'" class="badge accent">📎 '+esc(v.name||'file')+'</a>';
    }
    if(String(v).indexOf('data:image')===0) return '<img class="img-thumb" src="'+v+'" alt="">';
    return '—';
  }
  if(f.type==='money') return fmtMoney(num(v));
  if(f.type==='number') return fmtNum(num(v));
  if(f.type==='date') return fmtDate(v);
  if(f.type==='check') return v?'<span class="badge good">'+icon('check')+' Yes</span>':'<span class="badge neutral">No</span>';
  return esc(String(v));
}
function viewCustomModule(id){
  var m=findModule(id);

    '<button class="btn btn-ghost" data-action="custom-module-fields" data-id="'+m.id+'">'+icon('settings')+'<span class="btn-txt">Fields</span></button>'+
    '<button class="btn btn-primary" data-action="cm-record-new" data-id="'+m.id+'">'+icon('plus')+'<span class="btn-txt">Add record</span></button>');
  if(!(m.fields||[]).length){
    html+='<div class="card">'+emptyState('settings','Define your fields first','Add the columns this module should have — text, numbers, money, dates, dropdowns or checkboxes.','<button class="btn btn-sm btn-primary" data-action="custom-module-fields" data-id="'+m.id+'">'+icon('plus')+' Add fields</button>')+'</div>';
    html+=cmFooterHTML(m);
    return html;
  }
  var q=(ui.cmQ&&ui.cmQ[m.id])||'';
  html+='<div class="card"><div class="card-head">'+
    '<div class="searchbar">'+icon('search')+'<input class="input" placeholder="Search records…" value="'+esc(q)+'" data-action-input="cm-search" data-id="'+m.id+'"></div>'+
    '<span class="sub">'+(m.records||[]).length+' record'+((m.records||[]).length===1?'':'s')+'</span></div>';
  var records=(m.records||[]).filter(function(r){
    if(!q) return true;
    var hay=m.fields.map(function(f){return String(r[f.key]==null?'':r[f.key]);}).join(' ').toLowerCase();
    return hay.indexOf(q.toLowerCase())>=0;
  });
  if(!records.length){
    html+=emptyState(m.icon||'notes','No records'+(q?' match your search':' yet'),q?'Try a different search.':'Add your first record — totals for number and money columns are calculated automatically.','<button class="btn btn-sm btn-primary" data-action="cm-record-new" data-id="'+m.id+'">'+icon('plus')+' Add record</button>')+'</div>';
    html+=cmFooterHTML(m);
    return html;
  }
  html+='<div class="table-wrap"><table><thead><tr>'+m.fields.map(function(f){return '<th'+((f.type==='money'||f.type==='number')?' style="text-align:right"':'')+'>'+esc(f.label)+'</th>';}).join('')+'<th></th></tr></thead><tbody>';
  records.slice().reverse().forEach(function(r){
    html+='<tr>'+m.fields.map(function(f){
      return '<td'+((f.type==='money'||f.type==='number')?' class="num" style="text-align:right"':'')+'>'+cmFormatCell(f,r[f.key])+'</td>';
    }).join('')+
    '<td><div class="row-actions"><button class="btn-icon" data-action="cm-record-edit" data-id="'+m.id+'" data-rec="'+r.id+'">'+icon('edit')+'</button><button class="btn-icon danger" data-action="cm-record-delete" data-id="'+m.id+'" data-rec="'+r.id+'">'+icon('trash')+'</button></div></td></tr>';
  });
  // totals row for numeric fields
  var hasNumeric=m.fields.some(function(f){return f.type==='money'||f.type==='number';});
  if(hasNumeric){
    html+='</tbody><tfoot><tr>'+m.fields.map(function(f,i){
      if(f.type==='money') return '<td class="num" style="text-align:right;font-weight:800">'+fmtMoney(sum(records,function(r){return num(r[f.key]);}))+'</td>';
      if(f.type==='number') return '<td class="num" style="text-align:right;font-weight:800">'+fmtNum(sum(records,function(r){return num(r[f.key]);}))+'</td>';
      return '<td>'+(i===0?'<b>Total</b>':'')+'</td>';
    }).join('')+'<td></td></tr></tfoot>';
  } else html+='</tbody>';
  html+='</table></div></div>';
  html+=cmFooterHTML(m);
  return html;

  var body=

    '<div class="form-row"><div class="field"><label>Module name *</label><input class="input" name="name" value="'+esc(m.name||'')+'" required placeholder="e.g. Suppliers, Equipment, Event Bookings…"></div>'+

    '<div class="field"><label>Fields — the columns of your table</label>'+

  openModal(isEdit?'Edit module — '+m.name:'Create your own module',body,{wide:true,submitLabel:isEdit?'Save module':'Create module',onSubmit:function(form){
    var name=fv(form,'name');
    if(!name){ toast('Give the module a name.','error'); return false; }
    var rows=form.querySelectorAll('#mb-rows .mb-row');
    var fields=[];
    var bad=false;
    rows.forEach(function(row){
      var label=row.querySelector('.mb-label').value.trim();
      var keyEl=row.querySelector('.mb-key');
      var type=row.querySelector('.mb-type').value;
      var opts=row.querySelector('.mb-opts').value.split(',').map(function(s){return s.trim();}).filter(Boolean);
      if(!label){ if(keyEl) bad=true; return; }
      var f={key:keyEl?keyEl.value:'f'+uid(),label:label,type:type};
      if(type==='select') f.options=opts;
      fields.push(f);
    });
    if(bad){ toast('Every existing field needs a name (or remove it with the ✕).','error'); return false; }
    if(!fields.length){ toast('Add at least one field — that becomes your first column.','error'); return false; }
    var id=fv(form,'id');
    if(id){
      var ex=findModule(id);
      if(!ex) return true;
      var newKeys={}; fields.forEach(function(f){ newKeys[f.key]=1; });
      var removed=ex.fields.filter(function(f){ return !newKeys[f.key]; });
      var hasData=removed.some(function(f){ return (ex.records||[]).some(function(r){ return r[f.key]!=null&&r[f.key]!==''; }); });
      if(removed.length&&hasData&&!confirm('You removed '+removed.length+' field(s) that contain data — their values will be deleted from all records. Continue?')) return false;
      if(removed.length) snapshotForUndo();
      removed.forEach(function(f){ (ex.records||[]).forEach(function(r){ delete r[f.key]; }); });
      ex.name=name; ex.icon=fv(form,'icon'); ex.fields=fields;
      toast('Module saved.'+(removed.length?' ('+removed.length+' field(s) removed)':''),removed.length?'warn':'good',removed.length?{undo:true}:undefined);
    } else {
      var nm={id:uid(),name:name,icon:fv(form,'icon'),fields:fields,records:[]};
      state.customModules.push(nm);
      toast('"'+name+'" is ready — add your first record!');
      setTimeout(function(){ nav('custom-'+nm.id); },50);
    }
    return true;
  }});

/* ---------- v3 event wiring ---------- */
document.addEventListener('click',function(e){
  var el=e.target.closest('[data-action]');
  if(!el) return;
  var action=el.getAttribute('data-action');
  var id=el.getAttribute('data-id');

  /* products */
  if(action==='product-new'){ productModal(); return; }
  if(action==='product-edit'){ var p=findProduct(id); if(p) productModal(p); return; }
  if(action==='product-delete'){
    var p2=findProduct(id);
    if(!p2) return;
    var inOrders=(state.orders||[]).some(function(o){return (o.items||[]).some(function(it){return it.productId===id;});});
    if(inOrders){
      if(confirm('"'+p2.name+'" is used in past orders, so it will be archived instead of deleted. Continue?')){
        p2.active=false; commit(); toast('Product archived.');
      }
    } else if(confirm('Delete product "'+p2.name+'"?')){
      snapshotForUndo();
      state.products=state.products.filter(function(x){return x.id!==id;});
      commit(); toast('Product deleted.','warn',{undo:true});
    }
    return;
  }
  if(action==='product-unarchive'){ var p3=findProduct(id); if(p3){ p3.active=true; commit(); toast('Product restored.'); } return; }
  if(action==='product-restock'){ var p4=findProduct(id); if(p4) restockModal(p4); return; }
  if(action==='stock-adjust'){
    var p5=findProduct(id);
    if(p5){ p5.stock+=parseInt(el.getAttribute('data-delta'),10); commit(); }
    return;
  }
  if(action==='product-cat-filter'){ ui.productCat=el.getAttribute('data-val'); render(); return; }
  if(action==='product-cat-del'){
    var name=el.getAttribute('data-name');
    if(confirm('Remove category "'+name+'"? Products keep it until you edit them.')){
      state.settings.productCats=productCats().filter(function(c){return c!==name;});
      commit();
    }
    return;
  }
  if(action==='product-attr-del'){
    var aname=el.getAttribute('data-name');
    if(confirm('Remove attribute "'+aname+'" from the catalog? Values already saved on products are kept but hidden.')){
      state.settings.productAttrs=productAttrs().filter(function(a){return a!==aname;});
      commit();
    }
    return;

/* ---------- CSV export ---------- */
function downloadCSV(filename,rows){
  try{
    var csv=rows.map(function(r){
      return r.map(function(c){
        c=c==null?'':String(c);
        return /[",\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c;
      }).join(',');
    }).join('\r\n');
    var blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
    var a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=filename;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function(){ URL.revokeObjectURL(a.href); },2000);
    toast('CSV exported — opens in Excel / Google Sheets.');
  }catch(e){ toast('CSV export failed: '+e.message,'error'); }
}
function exportCSV(what,id){
  var today=todayISO();
  if(what==='finance'){
    var rows=[['Date','Type','Category','Amount','Note','Client']];
    // (invoice export gains currency below)
    state.finance.slice().sort(function(a,b){return (a.date||'').localeCompare(b.date||'');}).forEach(function(e){
      rows.push([e.date,e.type,e.category||'',e.amount,e.note||'',e.client||'']);
    });
    downloadCSV('finance-'+today+'.csv',rows);
  } else if(what==='products'){
    var attrs=productAttrs();
    var rows2=[['Name','SKU','Category'].concat(attrs).concat(['Price','Cost','Stock','Low-stock at','Notes'])];
    (state.products||[]).forEach(function(p){
      rows2.push([p.name,p.sku||'',p.category||''].concat(attrs.map(function(a){return (p.attrs||{})[a]||'';})).concat([p.price,p.cost||0,p.stock,p.lowStock!=null?p.lowStock:'',p.desc||'']));
    });
    downloadCSV('products-'+today+'.csv',rows2);
  } else if(what==='orders'){
    var rows3=[['Order #','Date','Customer','Contact','Address','Items','Total','Status','Payment','Deliver by','Note']];
    (state.orders||[]).forEach(function(o){
      rows3.push([o.number,o.orderDate,o.clientName,o.contact||'',o.address||'',(o.items||[]).map(function(it){return it.name+' x'+it.qty;}).join('; '),orderTotal(o),o.status,o.payStatus,o.deliveryDate||'',o.note||'']);
    });
    downloadCSV('orders-'+today+'.csv',rows3);
  } else if(what==='clients'){
    var rows4=[['Name','Status','Contact','Est. value/mo','Notes']];
    state.clients.forEach(function(c){ rows4.push([c.name,c.status,c.contact||'',c.value||0,c.note||'']); });
    downloadCSV('clients-'+today+'.csv',rows4);
  } else if(what==='module'){
    var m=findModule(id);
    if(!m) return;
    var rows5=[m.fields.map(function(f){return f.label;})];
    (m.records||[]).forEach(function(r){
      rows5.push(m.fields.map(function(f){
        var v=r[f.key];
        if(f.type==='check') return v?'Yes':'No';
        if(f.type==='image') return v?((v.name||'photo')):'';
        return v==null?'':v;
      }));
    });
    downloadCSV(m.name.toLowerCase().replace(/[^a-z0-9]+/g,'-')+'-'+today+'.csv',rows5);
  }
}

/* Compress images client-side so they fit in localStorage and
   sync cleanly to Firebase. Non-image files under 300KB are kept
   as downloadable attachments. */
function processUploadFile(file,cb){
  if(!file){ cb(null,null,'No file selected.'); return; }
  var isImage=/^image\//.test(file.type)||/\.(heic|heif)$/i.test(file.name||'');
  if(!isImage){
    if(file.size>300*1024){ cb(null,null,'Non-image files must be under 300 KB (browser storage is limited). For bigger files, keep a link in a text field instead.'); return; }
    var fr=new FileReader();
    fr.onload=function(){ cb(fr.result,file.name,null); };
    fr.onerror=function(){ cb(null,null,'Could not read the file.'); };
    fr.readAsDataURL(file);
    return;
  }
  var reader=new FileReader();
  reader.onload=function(){
    var img=new Image();
    img.onload=function(){
      try{
        var max=720, w=img.width, h=img.height;
        var scale=Math.min(1,max/Math.max(w,h));
        var canvas=document.createElement('canvas');
        canvas.width=Math.max(1,Math.round(w*scale));
        canvas.height=Math.max(1,Math.round(h*scale));
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        var out=canvas.toDataURL('image/jpeg',0.72);
        if(out.length>900*1024){ out=canvas.toDataURL('image/jpeg',0.5); }
        cb(out,file.name,null);
      }catch(err){ cb(null,null,'Could not process this image: '+err.message); }
    };
    img.onerror=function(){ cb(null,null,'This browser cannot decode that format. HEIC only works in Safari — please convert to JPG or PNG (your phone’s share menu usually offers this).'); };
    img.src=reader.result;
  };
  reader.onerror=function(){ cb(null,null,'Could not read the file.'); };
  reader.readAsDataURL(file);
}

/* ============================================================
   v6: sandbox-proof saving — never rely on native form submission.
   Some viewers/in-app browsers block native <form> submit entirely
   (clicks land but no submit event fires). We intercept the click
   on any submit button ourselves and dispatch the submit event
   manually, with a duplicate-fire guard for normal browsers.
   ============================================================ */
function dispatchSubmit(form){
  var ev;
  try{ ev=new Event('submit',{bubbles:true,cancelable:true}); }
  catch(_){ ev=document.createEvent('Event'); ev.initEvent('submit',true,true); }
  form.dispatchEvent(ev);
}
/* every click on a submit button saves directly — no native submit needed */
document.addEventListener('click',function(e){
  var btn=e.target.closest('button');
  if(!btn||btn.disabled) return;
  if((btn.getAttribute('type')||'submit').toLowerCase()!=='submit') return;
  var form=btn.form||btn.closest('form');
  if(!form) return;
  e.preventDefault();
  dispatchSubmit(form);
});
/* Enter key in any form field saves too, same sandbox-proof path */
document.addEventListener('keydown',function(e){
  if(e.key!=='Enter'||e.shiftKey||e.ctrlKey||e.altKey||e.metaKey) return;
  var t=e.target;
  if(!t||!t.form) return;
  if(t.tagName==='TEXTAREA'||t.tagName==='BUTTON') return;
  if(t.id==='palette-input') return;
  e.preventDefault();
  dispatchSubmit(t.form);
});

/* ---------- materials & recipes ---------- */
function findMaterial(id){ return (state.materials||[]).find(function(m){return m.id===id;}); }
function canMake(p){
  if(!(p.bom||[]).length) return Infinity;
  var n=Infinity;
  p.bom.forEach(function(b){
    var m=findMaterial(b.materialId);
    if(!m||b.qty<=0){ return; }
    n=Math.min(n,Math.floor(m.stock/b.qty));
  });
  return n===Infinity?0:Math.max(0,n);
}
function consumeMaterials(p,units){
  (p.bom||[]).forEach(function(b){
    var m=findMaterial(b.materialId);
    if(m) m.stock=Math.round((m.stock-b.qty*units)*100)/100;
  });
}

function orderProfit(o){
  var cost=0;
  (o.items||[]).forEach(function(it){
    var p=findProduct(it.productId);

  return orderTotal(o)-cost;
}

/* ---------- win-back list ---------- */
function winBackList(){
  var last={};
  state.finance.forEach(function(e){
    if(e.type==='income'&&e.client){
      var k=e.client.toLowerCase();
      if(!last[k]||e.date>last[k]) last[k]=e.date;
    }
  });
  (state.orders||[]).forEach(function(o){
    if(o.status==='Cancelled'||!o.clientName) return;
    var k=o.clientName.toLowerCase();
    if(!last[k]||o.orderDate>last[k]) last[k]=o.orderDate;
  });
  var out=[];
  state.clients.forEach(function(c){
    if(c.status==='Churned') return;
    var k=(c.name||'').toLowerCase();
    if(!last[k]) return;
    var days=-daysUntil(last[k]);
    if(days>=45) out.push({name:c.name,contact:c.contact,days:days,lastDate:last[k]});
  });
  out.sort(function(a,b){ return a.days-b.days; });
  return out;
}

  var list=winBackList();
  if(!list.length) return '';
  var html='<div class="card mt-lg" style="border-left:4px solid var(--info)"><div class="card-head" style="margin-bottom:8px"><h3>🔁 Win-back opportunities</h3><span class="sub">bought before, quiet for 45+ days — a message to them is 5× cheaper than a new customer</span></div>';

document.addEventListener('dragstart',function(e){
  var card=e.target.closest&&e.target.closest('.kb-card');
  if(!card) return;
  dragOrderId=card.getAttribute('data-order-id');
  card.classList.add('dragging');
  if(e.dataTransfer){ e.dataTransfer.effectAllowed='move'; try{ e.dataTransfer.setData('text/plain',dragOrderId); }catch(_){} }
});
document.addEventListener('dragend',function(e){
  var card=e.target.closest&&e.target.closest('.kb-card');
  if(card) card.classList.remove('dragging');
});
document.addEventListener('dragover',function(e){
  var col=e.target.closest&&e.target.closest('[data-drop-status]');
  if(col&&dragOrderId){ e.preventDefault(); col.classList.add('drag-over'); }
});
document.addEventListener('dragleave',function(e){
  var col=e.target.closest&&e.target.closest('[data-drop-status]');
  if(col) col.classList.remove('drag-over');
});
document.addEventListener('drop',function(e){
  var col=e.target.closest&&e.target.closest('[data-drop-status]');
  if(!col||!dragOrderId) return;
  e.preventDefault();
  var o=state.orders.find(function(x){return x.id===dragOrderId;});
  dragOrderId=null;
  if(o){
    var newStatus=col.getAttribute('data-drop-status');
    if(o.status!==newStatus){
      o.status=newStatus;
      commit();
      if(newStatus==='Delivered') toast('📦 '+o.number+' delivered!'+(o.payStatus!=='Paid'?' Mark it paid once you collect.':''));
    }
  }
});

var ACCOUNT_TYPES=['Bank','E-wallet','Cash','Other'];
function findAccount(id){ return (state.accounts||[]).find(function(a){return a.id===id;}); }
function accountBalance(a){
  var bal=a.opening||0;
  state.finance.forEach(function(e){
    if(e.account!==a.id) return;
    bal+=e.type==='income'?e.amount:-e.amount;
  });
  (state.transfers||[]).forEach(function(t){
    if(t.to===a.id) bal+=t.amount;
    if(t.from===a.id) bal-=t.amount;
  });
  (a.adjust||[]).forEach(function(adj){ bal+=adj.delta; });
  return Math.round(bal*100)/100;
}
function accountMonthFlow(a,mk){
  var inn=0,out=0;
  state.finance.forEach(function(e){
    if(e.account!==a.id||monthKey(e.date)!==mk) return;
    if(e.type==='income') inn+=e.amount; else out+=e.amount;
  });
  return {inn:inn,out:out};
}
function receivablesTotal(){
  var inv=sum((state.invoices||[]).filter(function(iv){return iv.status!=='Paid';}),function(iv){return iv.amount;});
  var ord=sum((state.orders||[]).filter(function(o){return o.payStatus!=='Paid'&&o.status!=='Cancelled';}),orderTotal);
  return inv+ord;
}

  if(!tr.length){
    html+='<p style="font-size:.82rem;color:var(--text-3)">No transfers yet — e.g. sweeping GCash collections into the bank.</p>';

    html+='<div class="table-wrap"><table><thead><tr><th>Date</th><th>From</th><th>To</th><th style="text-align:right">Amount</th><th>Note</th><th></th></tr></thead><tbody>';
    tr.slice(0,10).forEach(function(x){

      html+='<tr><td style="white-space:nowrap">'+fmtDate(x.date)+'</td>'+

function reconcileModal(a){

function todayPanelHTML(){
  var items=[];
  var today=todayISO();
  // deliveries
  var dueToday=(state.orders||[]).filter(function(o){ return o.status!=='Delivered'&&o.status!=='Cancelled'&&o.deliveryDate===today; });
  var lateDeliv=(state.orders||[]).filter(function(o){ var d=daysUntil(o.deliveryDate); return o.status!=='Delivered'&&o.status!=='Cancelled'&&d!=null&&d<0; });
  if(dueToday.length) items.push({cls:'info',icon:'truck',text:'<b>'+dueToday.length+'</b> deliver'+(dueToday.length>1?'ies':'y')+' today — '+esc(dueToday.map(function(o){return o.clientName;}).join(', ')),route:'orders'});
  if(lateDeliv.length) items.push({cls:'risk',icon:'truck',text:'<b>'+lateDeliv.length+'</b> late deliver'+(lateDeliv.length>1?'ies':'y')+' — oldest: '+esc(lateDeliv[0].clientName),route:'orders'});
  // follow-ups
  var fu=unpaidFollowUps();
  if(fu.length) items.push({cls:'warn',icon:'cash',text:'<b>'+fu.length+'</b> unpaid order'+(fu.length>1?'s':'')+' to follow up ('+fmtMoney(sum(fu,function(x){return orderTotal(x.o);}))+')',route:'orders'});
  // tasks due today / overdue
  var tToday=state.tasks.filter(function(t){ return !t.done&&t.deadline===today; });
  var tLate=state.tasks.filter(function(t){ var d=daysUntil(t.deadline); return !t.done&&d!=null&&d<0; });
  if(tToday.length) items.push({cls:'info',icon:'tasks',text:'<b>'+tToday.length+'</b> task'+(tToday.length>1?'s':'')+' due today',route:'tasks'});
  if(tLate.length) items.push({cls:'warn',icon:'clock',text:'<b>'+tLate.length+'</b> overdue task'+(tLate.length>1?'s':''),route:'tasks'});
  // low stock
  var low=(state.products||[]).filter(function(p){ return p.active!==false&&p.stock<=(p.lowStock!=null?p.lowStock:5); });
  if(low.length) items.push({cls:'warn',icon:'box',text:'<b>'+esc(low[0].name)+'</b>'+(low.length>1?' +'+(low.length-1)+' more':'')+' low on stock',route:'products'});
  var lowMat=(state.materials||[]).filter(function(m){ return m.stock<=(m.lowStock!=null?m.lowStock:0); });
  if(lowMat.length) items.push({cls:'warn',icon:'box',text:'<b>'+esc(lowMat[0].name)+'</b> running out — restock materials',route:'products'});
  // utang overdue
  var od=utangOverdue();

/* ---------- storage meter ---------- */
function storageUsage(){
  var bytes=0;
  try{ bytes=(localStorage.getItem(LS_KEY)||'').length*2; }catch(_){ }
  var photoBytes=0, photoCount=0;
  function countImg(v){ if(v&&typeof v==='string'&&v.indexOf('data:')===0){ photoBytes+=v.length*2; photoCount++; } }
  (state.products||[]).forEach(function(p){ countImg(p.photo); });
  (state.accounts||[]).forEach(function(a){ countImg(a.logo); });
  state.finance.forEach(function(e){ countImg(e.receipt); });
  (state.customModules||[]).forEach(function(m){ (m.records||[]).forEach(function(r){ m.fields.forEach(function(f){ if(f.type==='image'&&r[f.key]&&r[f.key].data) countImg(r[f.key].data); }); }); });
  return {bytes:bytes,photoBytes:photoBytes,photoCount:photoCount,limit:5*1024*1024};
}
function storageCardHTML(){
  var u=storageUsage();
  var pct=clamp(u.bytes/u.limit*100,0,100);
  var cls=pct>=85?'risk':(pct>=65?'warn':'good');
  return '<div class="card"><div class="card-head"><h3>Storage health</h3><span class="spacer"></span><span class="badge '+cls+'">'+fmtNum(pct,0)+'% used</span></div>'+
    '<div class="progress thick"><div class="bar '+cls+'" style="width:'+pct+'%"></div></div>'+
    '<p style="font-size:.8rem;color:var(--text-2);margin-top:10px">'+fmtNum(u.bytes/1024,0)+' KB of ~5,120 KB browser storage. Photos: <b>'+u.photoCount+'</b> using '+fmtNum(u.photoBytes/1024,0)+' KB.'+
    (pct>=65?' <b style="color:var(--'+(pct>=85?'risk':'warn')+')">Getting full</b> — export a backup, then remove old receipt photos (the entries stay; only the images go).':' Plenty of room.')+'</p>'+
    '<button class="btn btn-sm btn-ghost" data-action="trim-receipts" style="margin-top:10px">'+icon('trash')+' Trim receipt photos older than 6 months</button></div>';
}
function storageWarnOnBoot(){
  var u=storageUsage();
  var pct=u.bytes/u.limit*100;
  if(pct>=65) setTimeout(function(){
    toast('Browser storage is '+fmtNum(pct,0)+'% full (mostly photos). Export a backup and trim old receipt images in Settings → Data & Sync.',pct>=85?'error':'warn');
  },2600);
}

function yearData(year){
  var rev=0,exp=0,byMonth={},cats={},clients={};
  state.finance.forEach(function(e){
    if((e.date||'').slice(0,4)!==year) return;
    var mk=monthKey(e.date);
    byMonth[mk]=byMonth[mk]||{rev:0,exp:0};
    if(e.type==='income'){ rev+=e.amount; byMonth[mk].rev+=e.amount; cats[e.category||'Other']=(cats[e.category||'Other']||0)+e.amount; if(e.client) clients[e.client]=(clients[e.client]||0)+e.amount; }
    else { exp+=e.amount; byMonth[mk].exp+=e.amount; }
  });
  var months=Object.keys(byMonth).sort().map(function(k){ return {k:k,rev:byMonth[k].rev,exp:byMonth[k].exp}; });
  var best=null,bestAmt=0;
  months.forEach(function(m){ if(m.rev>bestAmt){ bestAmt=m.rev; best=m.k; } });
  function rank(map){ return Object.keys(map).sort(function(a,b){return map[b]-map[a];}).slice(0,6).map(function(k){return {label:k,value:map[k]};}); }
  return {revenue:rev,expenses:exp,profit:rev-exp,months:months,bestMonth:best,bestAmount:bestAmt,topIncomeCats:rank(cats),topClients:rank(clients)};
}

/* ---------- receipt OCR (Tesseract.js, lazy-loaded from CDN) ---------- */
var tessPromise=null;
function loadTesseract(){
  if(window.Tesseract) return Promise.resolve(window.Tesseract);
  if(tessPromise) return tessPromise;
  tessPromise=new Promise(function(resolve,reject){
    var s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
    s.onload=function(){ window.Tesseract?resolve(window.Tesseract):reject(new Error('OCR library loaded but unavailable.')); };
    s.onerror=function(){ tessPromise=null; reject(new Error('Could not download the OCR engine — check your internet connection.')); };
    document.head.appendChild(s);
  });
  return tessPromise;
}
function parseReceiptText(text){
  var lines=(text||'').split('\n').map(function(s){return s.trim();}).filter(Boolean);
  var out={amount:null,date:null,merchant:'',category:''};
  // amount: prefer lines mentioning total/amount due; take the largest number on them
  var totRe=/(grand\s*total|total\s*amount|amount\s*due|^total\b|\btotal\b)/i;
  var numRe=/\d{1,3}(?:[.,]\d{3})*[.,]\d{2}|\d+[.,]\d{2}/g;
  function parseNum(sv){ 
    sv=sv.replace(/[^0-9.,]/g,'');
    if(/,\d{2}$/.test(sv)&&sv.indexOf('.')<0) sv=sv.replace(',','.'); // euro-style decimals
    return parseFloat(sv.replace(/,/g,''));
  }
  var totalCands=[],allCands=[];
  lines.forEach(function(line){
    var nums=line.match(numRe);
    if(!nums) return;
    nums.forEach(function(nstr){
      var v=parseNum(nstr);
      if(!isFinite(v)||v<=0||v>10000000) return;
      allCands.push(v);
      if(totRe.test(line)&&!/sub\s*total|vat|tax|change|tender/i.test(line)) totalCands.push(v);
    });
  });
  if(totalCands.length) out.amount=Math.max.apply(null,totalCands);
  else if(allCands.length) out.amount=Math.max.apply(null,allCands);
  // date: mm/dd/yyyy, dd-mm-yyyy, "Jan 5, 2026" etc.
  var joined=lines.join(' ');
  var m=joined.match(/(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})/);
  if(m){
    var a=+m[1],b=+m[2],y=+m[3]; if(y<100) y+=2000;
    var mo=a,da=b;
    if(a>12&&b<=12){ mo=b; da=a; }
    if(mo>=1&&mo<=12&&da>=1&&da<=31&&y>2000&&y<2100)
      out.date=y+'-'+String(mo).padStart(2,'0')+'-'+String(da).padStart(2,'0');
  }
  if(!out.date){
    var mn=joined.match(/(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\.?\s+(\d{1,2}),?\s+(\d{4})/i);
    if(mn){
      var months=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
      out.date=mn[3]+'-'+String(months.indexOf(mn[1].toLowerCase().slice(0,3))+1).padStart(2,'0')+'-'+String(+mn[2]).padStart(2,'0');
    }
  }
  // merchant: first line that looks like a name (letters, not receipt boilerplate)
  for(var i=0;i<Math.min(lines.length,6);i++){
    var L=lines[i];
    if(/receipt|invoice|official|tel|vat|tin|date|cashier|address/i.test(L)) continue;
    if((L.match(/[A-Za-z]/g)||[]).length>=3&&L.length<=48){ out.merchant=L.replace(/[^\w\s&.'-]/g,'').trim(); break; }
  }
  // category guess
  var lower=joined.toLowerCase();
  if(/grab|taxi|fare|gas|petron|shell|caltex|parking|toll/.test(lower)) out.category='Transport';
  else if(/grocery|supermarket|mart|hardware|supplies|wax|craft/.test(lower)) out.category='Inventory / Supplies';
  else if(/meralco|electric|water|internet|pldt|globe|converge|rent/.test(lower)) out.category='Rent & Utilities';
  else if(/facebook|meta|google|ads|boost/.test(lower)) out.category='Marketing & Ads';
  return out;
}
function scanReceipt(btn){
  var form=btn.closest('form');
  if(!form) return;
  var img=form.elements['receipt']?form.elements['receipt'].value:'';
  if(!img){ toast('Attach a receipt photo first, then scan.','warn'); return; }
  var origLabel=btn.innerHTML;
  btn.disabled=true;
  btn.textContent='Loading OCR engine…';
  loadTesseract().then(function(T){
    btn.textContent='Scanning… 0%';
    return T.recognize(img,'eng',{logger:function(m){
      if(m.status==='recognizing text') btn.textContent='Scanning… '+Math.round((m.progress||0)*100)+'%';
    }});
  }).then(function(res){
    var parsed=parseReceiptText(res&&res.data?res.data.text:'');
    var filled=[];
    if(parsed.amount&&form.elements['amount']&&!num(form.elements['amount'].value)){ form.elements['amount'].value=parsed.amount; filled.push('amount '+fmtMoney(parsed.amount)); }
    if(parsed.date&&form.elements['date']){ form.elements['date'].value=parsed.date; filled.push('date'); }
    if(parsed.merchant&&form.elements['note']&&!form.elements['note'].value.trim()){ form.elements['note'].value=parsed.merchant; filled.push('merchant "'+parsed.merchant+'"'); }
    if(parsed.category&&form.elements['category']){
      var sel=form.elements['category'];
      for(var i=0;i<sel.options.length;i++){ if(sel.options[i].value===parsed.category){ sel.value=parsed.category; filled.push('category'); break; } }
    }
    if(filled.length) toast('Scanned ✓ Prefilled: '+filled.join(', ')+'. Double-check before saving!');
    else toast('Scanned the photo but could not confidently read values — enter them manually.','warn');
  }).catch(function(err){
    toast('OCR failed: '+err.message,'error');
  }).then(function(){
    btn.disabled=false;
    btn.innerHTML=origLabel;
  });
}
document.addEventListener('click',function(e){
  var el=e.target.closest('[data-action="ocr-scan"]');
  if(el) scanReceipt(el);
});

/* ---------- utang / lista ---------- */
function utangBalance(u){
  return Math.max(0,Math.round((u.amount-sum(u.payments||[],function(p){return p.amount;}))*100)/100);
}
function utangTotals(){
  var open=(state.utang||[]).filter(function(u){return !u.settled&&utangBalance(u)>0;});
  var names={};
  open.forEach(function(u){ names[(u.clientName||'').toLowerCase()]=1; });
  return {total:sum(open,utangBalance),customers:Object.keys(names).length,open:open};
}
function utangOverdue(){
  var od=(state.utang||[]).filter(function(u){
    if(u.settled||utangBalance(u)<=0) return false;
    return -daysUntil(u.date)>=30;
  });
  return {count:od.length,total:sum(od,utangBalance)};
}
function viewUtang(){
  var ut=utangTotals();
  var od=utangOverdue();
  var mk=thisMonthKey();
  var collected=0;
  (state.utang||[]).forEach(function(u){ (u.payments||[]).forEach(function(p){ if(monthKey(p.date)===mk) collected+=p.amount; }); });
  var html=topbar('Customer Credit','The digital credit notebook — customer tabs, partial payments, nothing forgotten.',
    '<button class="btn btn-primary" data-action="utang-new">'+icon('plus')+'<span class="btn-txt">'+esc(tr('Add credit'))+'</span></button>');
  html+='<div class="grid grid-4">'+
    statCard('Total credit owed',fmtMoney(ut.total),'<span class="stat-delta flat">'+ut.customers+' customer'+(ut.customers===1?'':'s')+'</span>','','ledger')+
    statCard('30+ days old',fmtMoney(od.total),od.count?'<span class="stat-delta down">'+od.count+' to follow up</span>':'<span class="stat-delta up">nothing aging</span>','','clock')+
    statCard('Collected this month',fmtMoney(collected),'<span class="stat-delta up">recorded as income on payment</span>','','cash')+
    statCard('Settled all-time',String((state.utang||[]).filter(function(u){return u.settled||utangBalance(u)<=0;}).length),'','','check')+
  '</div>';
  var list=(state.utang||[]).slice().sort(function(a,b){
    var ba=utangBalance(a)>0&&!a.settled, bb=utangBalance(b)>0&&!b.settled;
    if(ba!==bb) return ba?-1:1;
    return (a.date||'').localeCompare(b.date||'');
  });
  html+='<div class="card mt-lg">';
  if(!list.length){
    html+=emptyState('ledger','No customer credit yet','When a regular customer says "I\'ll pay later," record it here. Track partial payments, and income is only counted when cash actually arrives — honest cash-basis bookkeeping.','<button class="btn btn-sm btn-primary" data-action="utang-new">'+icon('plus')+' '+esc(tr('Add credit'))+'</button>');
  } else {
    // group by customer
    var groups={};
    list.forEach(function(u){
      var k=(u.clientName||'?');
      (groups[k]=groups[k]||[]).push(u);
    });
    Object.keys(groups).sort(function(a,b){
      return sum(groups[b],utangBalance)-sum(groups[a],utangBalance);
    }).forEach(function(name){
      var entries=groups[name];
      var bal=sum(entries.filter(function(u){return !u.settled;}),utangBalance);
      html+='<div style="border-bottom:1px solid var(--border);padding:12px 2px">'+
        '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap"><b style="font-size:.95rem;flex:1">'+esc(name)+'</b>'+
        (bal>0?'<span class="badge '+(entries.some(function(u){return !u.settled&&-daysUntil(u.date)>=30;})?'warn':'accent')+'" style="font-size:.8rem">'+esc(tr('balance'))+': '+fmtMoney(bal)+'</span>':'<span class="badge good">'+icon('check')+' '+esc(tr('fully paid'))+'</span>')+'</div>';
      entries.forEach(function(u){
        var b=utangBalance(u);
        var done=u.settled||b<=0;
        var age=-daysUntil(u.date);
        html+='<div style="margin-top:8px;padding:9px 12px;background:var(--bg-sunken);border-radius:10px">'+
          '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">'+
          '<span style="flex:1;font-size:.86rem;'+(done?'text-decoration:line-through;color:var(--text-3)':'')+'">'+esc(u.note||tr('Credit'))+'</span>'+
          '<span style="font-size:.72rem;color:var(--text-3)">'+fmtDate(u.date)+(!done&&age>=30?' · <b style="color:var(--warn)">'+age+'d</b>':'')+'</span>'+
          '<b class="num" style="font-size:.9rem;'+(done?'color:var(--text-3)':'')+'">'+fmtMoney(u.amount)+'</b></div>';
        if((u.payments||[]).length){
          html+='<div style="margin-top:5px;font-size:.74rem;color:var(--text-2)">'+u.payments.map(function(p){
            return '↳ '+esc(tr('payment'))+' '+fmtMoney(p.amount)+' · '+fmtDate(p.date)+(p.note?' ('+esc(p.note)+')':'');
          }).join('<br>')+'</div>';
        }
        if(!done){
          html+='<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">'+
            '<span class="badge risk">'+esc(tr('balance'))+': '+fmtMoney(b)+'</span>'+
            '<button class="btn btn-sm btn-good" data-action="utang-pay" data-id="'+u.id+'">'+icon('cash')+' '+esc(tr('Record payment'))+'</button>'+
            '<button class="btn-icon" data-action="utang-edit" data-id="'+u.id+'">'+icon('edit')+'</button>'+
            '<button class="btn-icon danger" data-action="utang-delete" data-id="'+u.id+'">'+icon('trash')+'</button></div>';
        } else {
          html+='<div style="display:flex;gap:6px;margin-top:6px"><button class="btn-icon danger" data-action="utang-delete" data-id="'+u.id+'">'+icon('trash')+'</button></div>';
        }
        html+='</div>';
      });
      html+='</div>';
    });
  }
  html+='</div>';
  html+='<p style="font-size:.74rem;color:var(--text-3);margin-top:10px">💡 Cash-basis: credit is not income yet. Income is recorded only when a payment is received — so your P&L always matches real money.</p>';
  return html;
}

function utangPayModal(u){

/* ---------- PH seasonal radar ---------- */
function phSeasonalEvents(){
  var now=new Date();
  function nthSunday(year,month,n){
    var d=new Date(year,month,1);
    var first=1+((7-d.getDay())%7);
    return new Date(year,month,first+7*(n-1));
  }
  var evs=[];
  [now.getFullYear(),now.getFullYear()+1].forEach(function(y){
    evs.push({name:"Valentine's Day",date:new Date(y,1,14),tip:'Gifting peak — romantic scents, couple bundles, pre-orders one week ahead.'});
    evs.push({name:'Graduation season',date:new Date(y,2,20),tip:'March–April grads — congrats bundles and personalized keychains.'});
    evs.push({name:"Mother's Day",date:nthSunday(y,4,2),tip:'One of the biggest gifting days of the year — gift boxes and floral scents.'});
    evs.push({name:"Father's Day",date:nthSunday(y,5,3),tip:'Gifting bump — woody/masculine scents and keychains.'});
    evs.push({name:"'Ber months kickoff",date:new Date(y,8,1),tip:'Christmas season starts NOW in PH — begin holiday production and teasers.'});
    evs.push({name:'Christmas peak',date:new Date(y,11,15),tip:'Peak gifting week — last call for orders; ship/produce early.'});
  });
  evs=evs.filter(function(e){
    var diff=(e.date-now)/86400000;
    return diff>=0&&diff<=75;
  }).sort(function(a,b){ return a.date-b.date; });
  return evs;
}

/* ---------- receipt photo cleanup (storage longevity) ---------- */
function trimOldReceipts(){
  var cutoff=shiftMonth(thisMonthKey(),-6)+'-01';
  var targets=state.finance.filter(function(e){ return e.receipt&&e.date<cutoff; });
  if(!targets.length){ toast('No receipt photos older than 6 months — storage is clean. ✨','good'); return; }
  var bytes=sum(targets,function(e){return e.receipt.length;})*2;
  if(!confirm('Remove '+targets.length+' receipt photo'+(targets.length>1?'s':'')+' older than 6 months (frees ~'+fmtNum(bytes/1024,0)+' KB)? The entries and amounts stay — only the images are removed. Export a backup first if you need them for taxes.')) return;
  snapshotForUndo();
  targets.forEach(function(e){ e.receipt=''; });
  commit();
  toast(targets.length+' old receipt photos removed — ~'+fmtNum(bytes/1024,0)+' KB freed.','good',{undo:true});
}

var FX_CURRENCIES=['PHP','USD','EUR','GBP','AUD','CAD','SGD','AED','JPY'];
var FX_SYMBOLS={PHP:'₱',USD:'$',EUR:'€',GBP:'£',AUD:'A$',CAD:'C$',SGD:'S$',AED:'د.إ',JPY:'¥'};
function fxRateFor(cur){
  if(!cur||cur==='PHP') return 1;
  var fx=state.settings.fx||{};
  return (fx.phpPer&&fx.phpPer[cur])||1;
}
/* automatic rates: free open API, no key. Falls back to saved/manual rates offline. */
var fxFetching=false;
function fetchFxRates(manual){
  if(fxFetching) return;
  fxFetching=true;
  fetch('https://open.er-api.com/v6/latest/PHP')
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(d){
      if(!d||!d.rates) throw new Error('no rates in response');
      var fx=state.settings.fx=state.settings.fx||{auto:true,phpPer:{}};
      fx.phpPer=fx.phpPer||{};
      FX_CURRENCIES.forEach(function(c){
        if(c!=='PHP'&&d.rates[c]) fx.phpPer[c]=Math.round((1/d.rates[c])*10000)/10000;
      });
      fx.updated=new Date().toISOString();
      save();
      if(manual){ toast('Exchange rates updated — ₱'+fmtNum(fx.phpPer.USD,2)+' per $1.'); render(); }
    })
    .catch(function(e){
      if(manual) toast('Could not fetch live rates ('+e.message+') — using your saved rates. You can edit them manually below.','warn');
    })
    .then(function(){ fxFetching=false; });
}
function fxAutoUpdateCheck(){
  var fx=state.settings.fx||{};
  if(fx.auto===false) return;
  var stale=!fx.updated||(Date.now()-new Date(fx.updated).getTime())>24*3600*1000;
  if(stale&&navigator.onLine!==false) setTimeout(function(){ fetchFxRates(false); },3000);
}

    '<p style="font-size:.8rem;color:var(--text-2);margin-bottom:12px">Used when an invoice is in a foreign currency — the peso equivalent shows on the invoice and your books record pesos. Rates auto-update daily when online (free public API); edit them manually anytime.</p>'+
    '<form data-form="fx-rates"><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:9px">'+

        return '<div class="field" style="margin-bottom:0"><label>₱ per 1 '+c+'</label><input class="input" type="number" step="any" min="0" name="fx_'+c+'" value="'+(fx.phpPer&&fx.phpPer[c]!=null?fx.phpPer[c]:'')+'"></div>';

    '<div style="display:flex;gap:8px;flex-wrap:wrap">'+

    '<button class="btn btn-ghost btn-sm" type="button" data-action="fx-update-now">'+icon('refresh')+' Update from live rates now</button>'+
    '</div></form></div>';
}
