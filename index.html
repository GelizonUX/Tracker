    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
    <style>
/* ==========================================================================
   Tracker — global stylesheet
   A single, token-driven sheet. Light + dark themes, fluid spacing, and a
   calm, paper-like writing surface.
   ========================================================================== */

:root {
  /* color tokens — light */
  --bg: #ffffff;
  --bg-app: #fbfbfa;
  --bg-sidebar: #f7f7f5;
  --bg-elev: #ffffff;
  --bg-hover: rgba(55, 53, 47, 0.06);
  --bg-active: rgba(55, 53, 47, 0.09);
  --bg-sunken: rgba(55, 53, 47, 0.035);

  --text: #37352f;
  --text-strong: #1d1b16;
  --text-muted: rgba(55, 53, 47, 0.62);
  --text-faint: rgba(55, 53, 47, 0.38);

  --border: rgba(55, 53, 47, 0.1);
  --border-strong: rgba(55, 53, 47, 0.18);

  --accent: #2f6fed;
  --accent-soft: rgba(47, 111, 237, 0.12);
  --danger: #e0584f;
  --danger-soft: rgba(224, 88, 79, 0.12);

  --callout-bg: rgba(55, 53, 47, 0.045);

  /* shape + motion */
  --radius-sm: 4px;
  --radius: 6px;
  --radius-lg: 10px;
  --radius-xl: 14px;

  --shadow-sm: 0 1px 2px rgba(15, 15, 15, 0.06), 0 1px 1px rgba(15, 15, 15, 0.04);
  --shadow-md: 0 4px 14px rgba(15, 15, 15, 0.1), 0 1px 3px rgba(15, 15, 15, 0.06);
  --shadow-lg: 0 12px 40px rgba(15, 15, 15, 0.16), 0 2px 8px rgba(15, 15, 15, 0.08);

  --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
  --fast: 110ms;
  --med: 180ms;

  /* layout */
  --sidebar-w: 264px;
  --editor-w: 740px;

  --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue",
    Arial, "Apple Color Emoji", "Segoe UI Emoji", sans-serif;
  --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;

  color-scheme: light;
}

[data-theme="dark"] {
  --bg: #202020;
  --bg-app: #191919;
  --bg-sidebar: #202020;
  --bg-elev: #2a2a2a;
  --bg-hover: rgba(255, 255, 255, 0.055);
  --bg-active: rgba(255, 255, 255, 0.09);
  --bg-sunken: rgba(255, 255, 255, 0.03);

  --text: rgba(255, 255, 255, 0.82);
  --text-strong: rgba(255, 255, 255, 0.95);
  --text-muted: rgba(255, 255, 255, 0.46);
  --text-faint: rgba(255, 255, 255, 0.3);

  --border: rgba(255, 255, 255, 0.094);
  --border-strong: rgba(255, 255, 255, 0.18);

  --accent: #5b8def;
  --accent-soft: rgba(91, 141, 239, 0.18);
  --danger: #ed6b62;
  --danger-soft: rgba(237, 107, 98, 0.16);

  --callout-bg: rgba(255, 255, 255, 0.045);

  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
  --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.45);
  --shadow-lg: 0 14px 44px rgba(0, 0, 0, 0.6);

  color-scheme: dark;
}

/* --- reset ---------------------------------------------------------------- */

*,
*::before,
*::after {
  box-sizing: border-box;
}

html,
body,
#root {
  height: 100%;
}

body {
  margin: 0;
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.5;
  color: var(--text);
  background: var(--bg-app);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

button {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
  cursor: pointer;
  border: none;
  background: none;
}

input,
textarea,
select {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
}

a {
  color: var(--accent);
}

/* custom scrollbars */
* {
  scrollbar-width: thin;
  scrollbar-color: var(--border-strong) transparent;
}
::-webkit-scrollbar {
  width: 11px;
  height: 11px;
}
::-webkit-scrollbar-thumb {
  background: var(--border-strong);
  border-radius: 8px;
  border: 3px solid transparent;
  background-clip: content-box;
}
::-webkit-scrollbar-thumb:hover {
  background: var(--text-faint);
  background-clip: content-box;
}

:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 1px;
  border-radius: var(--radius-sm);
}

/* --- shared atoms --------------------------------------------------------- */

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 32px;
  padding: 0 12px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg-elev);
  color: var(--text);
  font-size: 14px;
  font-weight: 500;
  transition: background var(--fast) var(--ease), border-color var(--fast) var(--ease),
    transform var(--fast) var(--ease);
}
.btn:hover {
  background: var(--bg-hover);
}
.btn:active {
  transform: translateY(1px);
}
.btn--primary {
  background: var(--accent);
  border-color: transparent;
  color: #fff;
}
.btn--primary:hover {
  filter: brightness(1.06);
  background: var(--accent);
}
.btn--danger {
  color: #fff;
  background: var(--danger);
  border-color: transparent;
}
.btn--danger:hover {
  filter: brightness(1.05);
  background: var(--danger);
}

.icon-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 30px;
  height: 30px;
  border-radius: var(--radius);
  color: var(--text-muted);
  transition: background var(--fast) var(--ease), color var(--fast) var(--ease);
}
.icon-btn:hover {
  background: var(--bg-hover);
  color: var(--text);
}

.chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 1px 8px;
  border-radius: 20px;
  background: var(--bg-active);
  color: var(--text);
  font-size: 12px;
  white-space: nowrap;
  line-height: 1.6;
}
.chip--removable button {
  margin-left: 2px;
  color: var(--text-muted);
  font-size: 10px;
  line-height: 1;
}
.chip--removable button:hover {
  color: var(--danger);
}

/* dropdown menus */
.menu {
  position: absolute;
  z-index: 60;
  min-width: 180px;
  padding: 5px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  animation: pop var(--med) var(--ease);
}
.menu__item {
  display: flex;
  align-items: center;
  width: 100%;
  padding: 7px 9px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  color: var(--text);
  text-align: left;
  transition: background var(--fast) var(--ease);
}
.menu__item:hover {
  background: var(--bg-hover);
}
.menu__item.is-active {
  background: var(--accent-soft);
}
.menu__item--danger {
  color: var(--danger);
}
.menu__item:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.menu__sep {
  height: 1px;
  margin: 5px 2px;
  background: var(--border);
}
.menu__label {
  padding: 6px 9px 4px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--text-faint);
}

/* ==========================================================================
   App shell
   ========================================================================== */

.app {
  display: flex;
  height: 100%;
  overflow: hidden;
}

.app__sidebar {
  flex: 0 0 auto;
  width: var(--sidebar-w);
  height: 100%;
  transition: width var(--med) var(--ease), transform var(--med) var(--ease);
  will-change: width;
}
.app--collapsed .app__sidebar {
  width: 0;
  overflow: hidden;
}

.app__main {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  height: 100%;
  background: var(--bg);
}

.app__content {
  flex: 1;
  overflow-y: auto;
  scroll-behavior: smooth;
}

.app__scrim {
  display: none;
}

.app__no-page {
  max-width: 380px;
  margin: 18vh auto 0;
  text-align: center;
  color: var(--text-muted);
}
.app__no-page h2 {
  color: var(--text);
}
.app__no-page .btn {
  margin-top: 12px;
}

/* ==========================================================================
   Sidebar
   ========================================================================== */

.sidebar {
  display: flex;
  flex-direction: column;
  width: var(--sidebar-w);
  height: 100%;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  overflow: hidden;
}

.sidebar__head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 8px 6px 12px;
}
.sidebar__brand {
  display: flex;
  align-items: center;
  gap: 9px;
  font-weight: 600;
  color: var(--text-strong);
}
.sidebar__logo {
  display: grid;
  place-items: center;
  width: 24px;
  height: 24px;
  border-radius: 6px;
  background: linear-gradient(135deg, #2c2c2c, #000);
  color: #fff;
  font-size: 14px;
  font-weight: 700;
}
[data-theme="dark"] .sidebar__logo {
  background: linear-gradient(135deg, #fff, #c9c9c9);
  color: #000;
}
.sidebar__brand-name {
  font-size: 15px;
}

.sidebar__actions {
  display: flex;
  flex-direction: column;
  gap: 1px;
  padding: 4px 8px 8px;
}
.sidebar__btn {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 6px 8px;
  border-radius: var(--radius);
  color: var(--text-muted);
  font-size: 14px;
  transition: background var(--fast) var(--ease), color var(--fast) var(--ease);
}
.sidebar__btn:hover {
  background: var(--bg-hover);
  color: var(--text);
}
.sidebar__btn-icon {
  width: 18px;
  text-align: center;
  font-size: 13px;
}
.sidebar__kbd {
  margin-left: auto;
  font-size: 11px;
  color: var(--text-faint);
}

.sidebar__nav {
  flex: 1;
  overflow-y: auto;
  padding: 6px 8px 20px;
}
.sidebar__section {
  margin-top: 12px;
}
.sidebar__section-title {
  padding: 4px 8px;
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: 0.02em;
  color: var(--text-faint);
}
.sidebar__flat {
  display: flex;
  align-items: center;
  gap: 7px;
  width: 100%;
  padding: 5px 8px;
  border-radius: var(--radius);
  color: var(--text);
  font-size: 14px;
  text-align: left;
  transition: background var(--fast) var(--ease);
}
.sidebar__flat:hover {
  background: var(--bg-hover);
}
.sidebar__flat.is-active {
  background: var(--bg-active);
  font-weight: 500;
}
.sidebar__star {
  margin-left: auto;
  color: #e6b800;
  font-size: 12px;
}
.sidebar__empty {
  padding: 6px 9px;
  font-size: 13px;
  color: var(--text-faint);
}

.sidebar__foot {
  padding: 8px;
  border-top: 1px solid var(--border);
}
.sidebar__foot-btn {
  width: 100%;
  padding: 7px;
  border-radius: var(--radius);
  color: var(--text-muted);
  font-size: 13.5px;
  transition: background var(--fast) var(--ease), color var(--fast) var(--ease);
}
.sidebar__foot-btn:hover {
  background: var(--bg-hover);
  color: var(--text);
}

/* page tree */
.tree__row {
  display: flex;
  align-items: center;
  gap: 4px;
  min-height: 28px;
  padding-right: 6px;
  border-radius: var(--radius);
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
  transition: background var(--fast) var(--ease);
}
.tree__row:hover {
  background: var(--bg-hover);
}
.tree__row.is-active {
  background: var(--bg-active);
  font-weight: 500;
}
.tree__caret {
  flex: 0 0 auto;
  width: 18px;
  height: 18px;
  display: grid;
  place-items: center;
  border-radius: 4px;
  color: var(--text-faint);
  font-size: 10px;
  transition: transform var(--fast) var(--ease), background var(--fast) var(--ease);
}
.tree__caret:hover {
  background: var(--bg-active);
}
.tree__caret.is-open {
  transform: rotate(90deg);
}
.tree__caret.is-hidden {
  visibility: hidden;
}
.tree__emoji {
  flex: 0 0 auto;
  width: 18px;
  text-align: center;
  font-size: 14px;
}
.tree__title {
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.tree__rename {
  flex: 1;
  min-width: 0;
  border: 1px solid var(--accent);
  border-radius: var(--radius-sm);
  padding: 1px 5px;
  background: var(--bg-elev);
}
.tree__actions {
  display: flex;
  align-items: center;
  gap: 1px;
  opacity: 0;
  transition: opacity var(--fast) var(--ease);
}
.tree__action {
  width: 22px;
  height: 22px;
  display: grid;
  place-items: center;
  border-radius: 4px;
  color: var(--text-muted);
  font-size: 13px;
}
.tree__action:hover {
  background: var(--bg-active);
  color: var(--text);
}
.tree__menu-wrap {
  position: relative;
}
.tree__menu {
  top: 26px;
  right: 0;
}

/* ==========================================================================
   Top bar
   ========================================================================== */

.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  height: 46px;
  padding: 0 12px;
  background: color-mix(in srgb, var(--bg) 86%, transparent);
  backdrop-filter: saturate(180%) blur(8px);
  border-bottom: 1px solid var(--border);
}
.topbar__left,
.topbar__right {
  display: flex;
  align-items: center;
  gap: 4px;
  min-width: 0;
}
.topbar__menu {
  display: none;
}

.breadcrumb {
  display: flex;
  align-items: center;
  gap: 2px;
  min-width: 0;
  overflow: hidden;
}
.breadcrumb__seg {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  min-width: 0;
}
.breadcrumb__item {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  max-width: 240px;
  padding: 4px 7px;
  border-radius: var(--radius);
  color: var(--text-muted);
  font-size: 14px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  transition: background var(--fast) var(--ease), color var(--fast) var(--ease);
}
.breadcrumb__item:hover {
  background: var(--bg-hover);
  color: var(--text);
}
.breadcrumb__seg:last-child .breadcrumb__item {
  color: var(--text);
  font-weight: 500;
}
.breadcrumb__sep {
  color: var(--text-faint);
  font-size: 13px;
}
.topbar__menu-wrap {
  position: relative;
}
.topbar__dropdown {
  top: 36px;
  right: 0;
}
.topbar__fav.is-fav {
  color: #e6b800;
}

/* ==========================================================================
   Editor
   ========================================================================== */

.editor {
  padding: clamp(20px, 4vw, 56px) 0 30vh;
}
.editor__inner {
  width: 100%;
  max-width: var(--editor-w);
  margin: 0 auto;
  padding: 0 clamp(18px, 5vw, 60px);
}
.editor__icon-row {
  position: relative;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 4px;
}
.editor__emoji {
  font-size: 52px;
  line-height: 1;
  border-radius: var(--radius);
  padding: 4px;
  transition: background var(--fast) var(--ease);
}
.editor__emoji:hover {
  background: var(--bg-hover);
}
.editor__save {
  margin-left: auto;
  font-size: 12.5px;
  color: var(--text-faint);
  transition: color var(--med) var(--ease);
}
.editor__save--saving {
  color: var(--accent);
}

.editor__title {
  display: block;
  width: 100%;
  margin: 2px 0 10px;
  border: none;
  background: none;
  resize: none;
  overflow: hidden;
  font-size: clamp(28px, 4vw, 40px);
  font-weight: 700;
  line-height: 1.2;
  color: var(--text-strong);
  letter-spacing: -0.01em;
}
.editor__title::placeholder {
  color: var(--text-faint);
}
.editor__title:focus {
  outline: none;
}

.editor__empty {
  padding: 24px 0;
  color: var(--text-muted);
}
.editor__add-block {
  display: block;
  width: 100%;
  margin-top: 8px;
  padding: 8px 6px;
  border-radius: var(--radius);
  color: var(--text-faint);
  font-size: 14px;
  text-align: left;
  opacity: 0;
  transition: opacity var(--fast) var(--ease), background var(--fast) var(--ease),
    color var(--fast) var(--ease);
}
.editor:hover .editor__add-block {
  opacity: 1;
}
.editor__add-block:hover {
  background: var(--bg-hover);
  color: var(--text-muted);
}

/* ==========================================================================
   Blocks
   ========================================================================== */

.block {
  position: relative;
  display: flex;
  align-items: flex-start;
  margin-left: -46px;
  padding-left: 46px;
  border-radius: var(--radius);
  transition: background var(--fast) var(--ease);
}
.block.is-drop-target {
  box-shadow: 0 -2px 0 var(--accent);
}
.block--embed {
  margin-left: 0;
  padding-left: 0;
}

.block__gutter {
  position: absolute;
  left: 8px;
  top: 2px;
  display: flex;
  align-items: center;
  gap: 1px;
  opacity: 0;
  transition: opacity var(--fast) var(--ease);
}
.block--embed .block__gutter {
  left: -36px;
}
.block__handle-btn {
  width: 20px;
  height: 24px;
  display: grid;
  place-items: center;
  border-radius: 4px;
  color: var(--text-faint);
  font-size: 14px;
  transition: background var(--fast) var(--ease), color var(--fast) var(--ease);
}
.block__handle-btn:hover {
  background: var(--bg-hover);
  color: var(--text-muted);
}
.block__drag {
  cursor: grab;
}
.block__drag:active {
  cursor: grabbing;
}
.block-actions {
  position: absolute;
  top: 28px;
  left: 0;
  z-index: 50;
  min-width: 150px;
  padding: 5px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  animation: pop var(--med) var(--ease);
}
.block-actions__item {
  display: block;
  width: 100%;
  padding: 7px 9px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  text-align: left;
}
.block-actions__item:hover {
  background: var(--bg-hover);
}
.block-actions__item--danger {
  color: var(--danger);
}
.block-actions__item:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.block__body {
  position: relative;
  flex: 1;
  min-width: 0;
  padding: 3px 2px;
}

.block__text {
  outline: none;
  white-space: pre-wrap;
  word-break: break-word;
  min-height: 1.5em;
}
.block__text:empty::before {
  content: attr(data-placeholder);
  color: var(--text-faint);
  pointer-events: none;
}
.block__h1,
.block__h2,
.block__h3 {
  margin: 0;
  font-weight: 700;
  color: var(--text-strong);
  letter-spacing: -0.01em;
}
.block__h1 {
  font-size: 1.7em;
  padding-top: 0.3em;
}
.block__h2 {
  font-size: 1.38em;
  padding-top: 0.25em;
}
.block__h3 {
  font-size: 1.15em;
  padding-top: 0.2em;
}

.block__list {
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.block__bullet {
  width: 16px;
  text-align: center;
  line-height: 1.6;
  color: var(--text);
}
.block__number {
  min-width: 18px;
  text-align: right;
  line-height: 1.6;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
}
.block__list .block__text {
  flex: 1;
}

.block__todo {
  display: flex;
  align-items: flex-start;
  gap: 9px;
}
.block__check {
  margin-top: 4px;
  width: 16px;
  height: 16px;
  accent-color: var(--accent);
  cursor: pointer;
}
.block__todo.is-done .block__text {
  color: var(--text-faint);
  text-decoration: line-through;
}

.block__quote {
  margin: 0;
  padding-left: 14px;
  border-left: 3px solid var(--border-strong);
  color: var(--text);
  font-style: normal;
}

.block__callout {
  display: flex;
  gap: 10px;
  padding: 12px 14px;
  border-radius: var(--radius);
  background: var(--callout-bg);
  border: 1px solid var(--border);
}
.block__callout-emoji {
  font-size: 16px;
  line-height: 1.5;
}

.block__toggle {
  width: 100%;
}
.block__toggle-head {
  display: flex;
  align-items: flex-start;
  gap: 6px;
}
.block__toggle-arrow {
  margin-top: 2px;
  width: 18px;
  height: 22px;
  color: var(--text-muted);
  font-size: 11px;
  transition: transform var(--fast) var(--ease);
}
.block__toggle-arrow.is-open {
  transform: rotate(90deg);
}
.block__toggle-body {
  width: 100%;
  margin: 4px 0 2px 24px;
  padding: 6px 8px;
  border: none;
  border-left: 2px solid var(--border);
  border-radius: 0;
  background: none;
  resize: none;
  color: var(--text);
  outline: none;
}
.block__toggle-body::placeholder {
  color: var(--text-faint);
}

.block__divider {
  width: 100%;
  margin: 8px 0;
  border: none;
  border-top: 1px solid var(--border-strong);
}

.block__code {
  width: 100%;
  border-radius: var(--radius);
  background: var(--bg-sunken);
  border: 1px solid var(--border);
  overflow: hidden;
}
.block__code-lang {
  display: block;
  width: 100%;
  padding: 6px 12px 0;
  border: none;
  background: none;
  color: var(--text-faint);
  font-size: 12px;
  outline: none;
}
.block__code-area {
  display: block;
  width: 100%;
  min-height: 40px;
  padding: 6px 12px 12px;
  border: none;
  background: none;
  resize: none;
  font-family: var(--mono);
  font-size: 13.5px;
  line-height: 1.5;
  color: var(--text);
  outline: none;
}

.block__image-empty {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px;
  border-radius: var(--radius);
  background: var(--bg-sunken);
  border: 1px dashed var(--border-strong);
}
.block__image-icon {
  font-size: 18px;
}
.block__image-input {
  flex: 1;
  border: none;
  background: none;
  outline: none;
}
.block__image {
  margin: 0;
  position: relative;
}
.block__image img {
  max-width: 100%;
  border-radius: var(--radius);
  display: block;
}
.block__image-caption {
  display: block;
  width: 100%;
  margin-top: 6px;
  border: none;
  background: none;
  color: var(--text-muted);
  font-size: 13px;
  outline: none;
}
.block__image-replace {
  position: absolute;
  top: 8px;
  right: 8px;
  padding: 3px 9px;
  border-radius: var(--radius);
  background: color-mix(in srgb, var(--bg) 80%, transparent);
  border: 1px solid var(--border);
  font-size: 12px;
  opacity: 0;
  transition: opacity var(--fast) var(--ease);
}
.block__image:hover .block__image-replace {
  opacity: 1;
}

.embed-missing {
  padding: 16px;
  border-radius: var(--radius);
  background: var(--bg-sunken);
  color: var(--text-muted);
  font-size: 14px;
  text-align: center;
}

/* ==========================================================================
   Slash menu
   ========================================================================== */

.slash-menu {
  position: absolute;
  z-index: 70;
  top: 100%;
  left: 0;
  margin-top: 4px;
  width: 300px;
  max-height: 320px;
  overflow-y: auto;
  padding: 6px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  animation: pop var(--med) var(--ease);
}
.slash-menu__empty {
  padding: 14px;
  text-align: center;
  color: var(--text-faint);
  font-size: 14px;
}
.slash-menu__group-label {
  padding: 6px 8px 3px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--text-faint);
}
.slash-menu__item {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 6px 8px;
  border-radius: var(--radius);
  text-align: left;
  transition: background var(--fast) var(--ease);
}
.slash-menu__item.is-active {
  background: var(--bg-hover);
}
.slash-menu__hint {
  flex: 0 0 auto;
  display: grid;
  place-items: center;
  width: 36px;
  height: 36px;
  border-radius: var(--radius);
  background: var(--bg-sunken);
  border: 1px solid var(--border);
  font-size: 14px;
  color: var(--text);
}
.slash-menu__text {
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.slash-menu__label {
  font-size: 14px;
  color: var(--text);
}
.slash-menu__desc {
  font-size: 12px;
  color: var(--text-faint);
}

/* ==========================================================================
   Emoji picker
   ========================================================================== */

.emoji-picker {
  position: absolute;
  z-index: 70;
  top: 64px;
  left: 0;
  width: 280px;
  padding: 8px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  animation: pop var(--med) var(--ease);
}
.emoji-picker__search {
  width: 100%;
  margin-bottom: 8px;
  padding: 6px 9px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-sunken);
  outline: none;
}
.emoji-picker__grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
  max-height: 200px;
  overflow-y: auto;
}
.emoji-picker__item {
  aspect-ratio: 1;
  display: grid;
  place-items: center;
  border-radius: var(--radius);
  font-size: 20px;
  transition: background var(--fast) var(--ease);
}
.emoji-picker__item:hover {
  background: var(--bg-hover);
}
.emoji-picker__empty {
  grid-column: 1 / -1;
  padding: 12px;
  text-align: center;
  color: var(--text-faint);
  font-size: 13px;
}

/* ==========================================================================
   Database table
   ========================================================================== */

.db {
  width: 100%;
  margin: 6px 0;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.db__toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-bottom: 1px solid var(--border);
}
.db__name {
  border: none;
  background: none;
  font-size: 15px;
  font-weight: 600;
  color: var(--text-strong);
  outline: none;
}
.db__toolbar-right {
  margin-left: auto;
}
.db__search,
.wf__search {
  width: 180px;
  max-width: 40vw;
  padding: 5px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-sunken);
  font-size: 13px;
  outline: none;
  transition: border-color var(--fast) var(--ease);
}
.db__search:focus,
.wf__search:focus {
  border-color: var(--accent);
}

.db__scroll {
  overflow-x: auto;
}
.db__table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
.db__table th,
.db__table td {
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  text-align: left;
  vertical-align: top;
}
.db__th {
  position: sticky;
  top: 0;
  z-index: 2;
  background: var(--bg-sunken);
  font-weight: 500;
  color: var(--text-muted);
}
.db__th-inner {
  display: flex;
  align-items: center;
  gap: 2px;
  padding: 2px 4px 2px 10px;
}
.db__th-name {
  flex: 1;
  min-width: 80px;
  border: none;
  background: none;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  outline: none;
}
.db__sort-mark {
  color: var(--accent);
  font-size: 12px;
}
.db__th-menu {
  width: 20px;
  height: 22px;
  border-radius: 4px;
  color: var(--text-faint);
  opacity: 0;
  transition: opacity var(--fast) var(--ease), background var(--fast) var(--ease);
}
.db__th:hover .db__th-menu {
  opacity: 1;
}
.db__th-menu:hover {
  background: var(--bg-active);
}
.db__th-dropdown {
  top: 32px;
  left: 6px;
}
.db__type-sub {
  position: static;
  margin: 4px 0;
  box-shadow: none;
  border: none;
  background: var(--bg-sunken);
  animation: none;
}
.db__rownum-head {
  width: 40px;
  background: var(--bg-sunken);
}
.db__rownum {
  position: relative;
  width: 40px;
  padding: 7px 6px;
  color: var(--text-faint);
  font-size: 12px;
  font-variant-numeric: tabular-nums;
  text-align: center;
  background: var(--bg-sunken);
}
.db__rowdel {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  color: var(--text-faint);
  opacity: 0;
  background: var(--bg-sunken);
  transition: opacity var(--fast) var(--ease), color var(--fast) var(--ease);
}
.db__row:hover .db__rowdel {
  opacity: 1;
}
.db__rowdel:hover {
  color: var(--danger);
}
.db__cell {
  min-width: 120px;
  padding: 0;
}
.db__cell--pad {
  min-width: 0;
  width: auto;
  border-right: none;
}
.db__input {
  width: 100%;
  padding: 7px 10px;
  border: none;
  background: none;
  outline: none;
  font-size: 14px;
}
.db__input:focus {
  background: var(--accent-soft);
}
.db__checkbox {
  margin: 9px 12px;
  width: 16px;
  height: 16px;
  accent-color: var(--accent);
}
.db__url {
  display: flex;
  align-items: center;
}
.db__url-link {
  padding: 0 8px;
  text-decoration: none;
}
.db__addcol {
  width: 44px;
  background: var(--bg-sunken);
}
.db__addcol-wrap {
  position: relative;
}
.db__addcol-btn {
  width: 100%;
  padding: 6px;
  color: var(--text-faint);
  transition: background var(--fast) var(--ease), color var(--fast) var(--ease);
}
.db__addcol-btn:hover {
  background: var(--bg-hover);
  color: var(--text);
}
.db__addcol-menu {
  top: 34px;
  right: 0;
}
.db__empty {
  padding: 18px;
  text-align: center;
  color: var(--text-faint);
}
.db__addrow {
  display: block;
  width: 100%;
  padding: 9px 12px;
  border-top: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 13.5px;
  text-align: left;
  transition: background var(--fast) var(--ease);
}
.db__addrow:hover {
  background: var(--bg-hover);
}

/* select cell */
.db__select {
  position: relative;
}
.db__select-trigger {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  width: 100%;
  min-height: 33px;
  padding: 6px 10px;
  text-align: left;
}
.db__select-trigger:hover {
  background: var(--bg-hover);
}
.db__select-placeholder {
  color: var(--text-faint);
  font-size: 13px;
}
.db__select-pop {
  position: absolute;
  z-index: 60;
  top: 100%;
  left: 0;
  width: 220px;
  padding: 8px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  animation: pop var(--med) var(--ease);
}
.db__select-input {
  width: 100%;
  margin-bottom: 6px;
  padding: 5px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-sunken);
  outline: none;
}
.db__select-list {
  display: flex;
  flex-direction: column;
  gap: 1px;
  max-height: 180px;
  overflow-y: auto;
}
.db__select-opt {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 6px;
  border-radius: var(--radius);
  text-align: left;
}
.db__select-opt:hover {
  background: var(--bg-hover);
}
.db__select-check {
  margin-left: auto;
  color: var(--accent);
}
.db__select-create {
  color: var(--text-muted);
  font-size: 13px;
}
.db__select-empty {
  padding: 8px 6px;
  color: var(--text-faint);
  font-size: 13px;
}

/* ==========================================================================
   Workflow board
   ========================================================================== */

.wf {
  width: 100%;
  margin: 6px 0;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  background: var(--bg-sunken);
  overflow: hidden;
}
.wf__toolbar {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
  padding: 10px 12px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.wf__name {
  border: none;
  background: none;
  font-size: 15px;
  font-weight: 600;
  color: var(--text-strong);
  outline: none;
}
.wf__views {
  display: flex;
  gap: 1px;
  padding: 2px;
  border-radius: var(--radius);
  background: var(--bg-sunken);
}
.wf__view-btn {
  padding: 4px 12px;
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  font-size: 13px;
  transition: background var(--fast) var(--ease), color var(--fast) var(--ease);
}
.wf__view-btn.is-active {
  background: var(--bg-elev);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}
.wf__filters {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
}
.wf__priority-filter {
  padding: 5px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-sunken);
  font-size: 13px;
  outline: none;
}

.wf__board {
  display: flex;
  gap: 12px;
  padding: 14px;
  overflow-x: auto;
  align-items: flex-start;
}
.wf__col {
  flex: 0 0 264px;
  width: 264px;
  border-radius: var(--radius-lg);
}
.wf__col-head {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 2px 4px 8px;
}
.wf__stage-name {
  flex: 1;
  min-width: 0;
  border: none;
  background: none;
  font-size: 13.5px;
  font-weight: 600;
  color: var(--text);
  outline: none;
}
.wf__count {
  color: var(--text-faint);
  font-size: 12px;
  font-variant-numeric: tabular-nums;
}
.wf__stage-del {
  width: 20px;
  height: 20px;
  border-radius: 4px;
  color: var(--text-faint);
  font-size: 11px;
  opacity: 0;
  transition: opacity var(--fast) var(--ease), color var(--fast) var(--ease);
}
.wf__col:hover .wf__stage-del {
  opacity: 1;
}
.wf__stage-del:hover {
  color: var(--danger);
  background: var(--bg-active);
}
.wf__cards {
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 12px;
}
.wf__card {
  padding: 10px 12px;
  border-radius: var(--radius-lg);
  background: var(--bg-elev);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: box-shadow var(--fast) var(--ease), transform var(--fast) var(--ease),
    border-color var(--fast) var(--ease);
}
.wf__card:hover {
  border-color: var(--border-strong);
  box-shadow: var(--shadow-md);
}
.wf__card.is-dragging {
  opacity: 0.4;
}
.wf__card.is-drop-before {
  box-shadow: 0 -2px 0 var(--accent), var(--shadow-sm);
}
.wf__card-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
}
.wf__card-desc {
  margin-top: 3px;
  font-size: 12.5px;
  color: var(--text-muted);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.wf__card-meta {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
}
.wf__card-due,
.wf__card-assignee {
  font-size: 12px;
  color: var(--text-muted);
}
.wf__card-assignee {
  padding: 1px 7px;
  border-radius: 20px;
  background: var(--bg-active);
}
.wf__tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 6px;
}
.wf__add-card {
  padding: 7px 10px;
  border-radius: var(--radius);
  color: var(--text-faint);
  font-size: 13px;
  text-align: left;
  transition: background var(--fast) var(--ease), color var(--fast) var(--ease);
}
.wf__add-card:hover {
  background: var(--bg-hover);
  color: var(--text-muted);
}
.wf__add-stage-col {
  flex: 0 0 200px;
}
.wf__add-stage {
  width: 100%;
  padding: 9px;
  border-radius: var(--radius-lg);
  border: 1px dashed var(--border-strong);
  color: var(--text-faint);
  font-size: 13px;
  transition: background var(--fast) var(--ease), color var(--fast) var(--ease);
}
.wf__add-stage:hover {
  background: var(--bg-hover);
  color: var(--text-muted);
}

/* priority chips */
.prio {
  padding: 1px 8px;
  border-radius: 20px;
  font-size: 11.5px;
  font-weight: 500;
}
.prio--none {
  color: var(--text-faint);
  background: var(--bg-active);
}
.prio--low {
  color: #2f7d63;
  background: rgba(47, 125, 99, 0.14);
}
.prio--medium {
  color: #9a6b00;
  background: rgba(154, 107, 0, 0.14);
}
.prio--high {
  color: #b4561c;
  background: rgba(180, 86, 28, 0.15);
}
.prio--urgent {
  color: #c0392f;
  background: var(--danger-soft);
}
.prio-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex: 0 0 auto;
}
.prio-dot--none {
  background: var(--border-strong);
}
.prio-dot--low {
  background: #2f7d63;
}
.prio-dot--medium {
  background: #c79100;
}
.prio-dot--high {
  background: #d2691e;
}
.prio-dot--urgent {
  background: var(--danger);
}

/* workflow table + list */
.wf__table-scroll {
  overflow-x: auto;
  background: var(--bg);
}
.wf__table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
.wf__table th {
  padding: 9px 12px;
  text-align: left;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  background: var(--bg-sunken);
}
.wf__table td {
  padding: 9px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.wf__trow {
  cursor: pointer;
  transition: background var(--fast) var(--ease);
}
.wf__trow:hover {
  background: var(--bg-hover);
}
.wf__inline-select {
  padding: 3px 6px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg);
  font-size: 13px;
  outline: none;
}
.wf__empty {
  padding: 18px;
  text-align: center;
  color: var(--text-faint);
}

.wf__list {
  padding: 12px;
  background: var(--bg);
}
.wf__list-group {
  margin-bottom: 14px;
}
.wf__list-head {
  padding: 4px 6px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
}
.wf__list-item {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 8px 10px;
  border-radius: var(--radius);
  text-align: left;
  transition: background var(--fast) var(--ease);
}
.wf__list-item:hover {
  background: var(--bg-hover);
}
.wf__list-title {
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.wf__list-due {
  font-size: 12px;
  color: var(--text-muted);
}
.wf__list-empty {
  padding: 6px 10px;
  color: var(--text-faint);
  font-size: 13px;
}

/* ==========================================================================
   Forms (card editor, etc.)
   ========================================================================== */

.form {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.form__row {
  display: flex;
  gap: 12px;
}
.form__row .form__field {
  flex: 1;
}
.form__field {
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.form__label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
}
.form__input {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-sunken);
  outline: none;
  transition: border-color var(--fast) var(--ease);
}
.form__input:focus {
  border-color: var(--accent);
}
.form__textarea {
  resize: vertical;
  min-height: 44px;
}
.form__tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
  padding: 6px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-sunken);
}
.form__tag-input {
  flex: 1;
  min-width: 90px;
  border: none;
  background: none;
  outline: none;
}

/* ==========================================================================
   Modals + overlays
   ========================================================================== */

.overlay {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: rgba(15, 15, 15, 0.4);
  backdrop-filter: blur(2px);
  animation: fade var(--med) var(--ease);
}
.overlay--top {
  align-items: flex-start;
  padding-top: 12vh;
}
.modal {
  width: 100%;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-lg);
  animation: rise var(--med) var(--ease);
  overflow: hidden;
}
.modal__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
}
.modal__title {
  margin: 0;
  font-size: 16px;
  font-weight: 600;
}
.modal__body {
  padding: 18px;
}
.modal__message {
  margin: 0;
  color: var(--text-muted);
  line-height: 1.55;
}
.modal__footer {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  padding: 14px 18px;
  border-top: 1px solid var(--border);
}

/* ==========================================================================
   Search modal
   ========================================================================== */

.search {
  width: 100%;
  max-width: 560px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  animation: rise var(--med) var(--ease);
}
.search__input-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.search__icon {
  color: var(--text-faint);
}
.search__input {
  flex: 1;
  border: none;
  background: none;
  font-size: 16px;
  outline: none;
}
.search__esc {
  padding: 2px 7px;
  border-radius: var(--radius-sm);
  background: var(--bg-sunken);
  border: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-faint);
}
.search__results {
  max-height: 56vh;
  overflow-y: auto;
  padding: 8px;
}
.search__empty {
  padding: 28px;
  text-align: center;
  color: var(--text-faint);
}
.search__group-label {
  padding: 8px 8px 4px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--text-faint);
}
.search__result {
  display: flex;
  align-items: center;
  gap: 11px;
  width: 100%;
  padding: 8px 10px;
  border-radius: var(--radius);
  text-align: left;
  transition: background var(--fast) var(--ease);
}
.search__result.is-active {
  background: var(--bg-hover);
}
.search__result-icon {
  flex: 0 0 auto;
  display: grid;
  place-items: center;
  width: 28px;
  height: 28px;
  border-radius: var(--radius);
  background: var(--bg-sunken);
  border: 1px solid var(--border);
  font-size: 14px;
}
.search__result-text {
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.search__result-title {
  font-size: 14px;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.search__result-sub {
  font-size: 12px;
  color: var(--text-faint);
}
.search__result-warn {
  margin-left: auto;
  font-size: 11px;
  color: var(--text-faint);
}

/* ==========================================================================
   Toasts
   ========================================================================== */

.toast-container {
  position: fixed;
  z-index: 200;
  left: 50%;
  bottom: 24px;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
  pointer-events: none;
}
.toast {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  border-radius: 30px;
  background: var(--text-strong);
  color: var(--bg);
  font-size: 13.5px;
  box-shadow: var(--shadow-lg);
  pointer-events: auto;
  animation: toastin var(--med) var(--ease);
}
[data-theme="dark"] .toast {
  background: #f2f2f2;
  color: #1a1a1a;
}
.toast__dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #4caf7d;
}
.toast--error .toast__dot {
  background: var(--danger);
}
.toast--info .toast__dot {
  background: var(--accent);
}

/* ==========================================================================
   Animations
   ========================================================================== */

@keyframes pop {
  from {
    opacity: 0;
    transform: scale(0.97) translateY(-4px);
  }
}
@keyframes rise {
  from {
    opacity: 0;
    transform: translateY(8px) scale(0.99);
  }
}
@keyframes fade {
  from {
    opacity: 0;
  }
}
@keyframes toastin {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
}

/* ==========================================================================
   Resizable embed frame
   ========================================================================== */

.embed-frame {
  position: relative;
  display: flex;
  flex-direction: column;
  width: 100%;
  min-width: 320px;
  min-height: 200px;
  margin: 8px 0;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  background: var(--bg);
  overflow: hidden;
  resize: both;
  box-shadow: var(--shadow-sm);
}
.embed-frame.is-full {
  resize: vertical;
  width: min(1240px, calc(100vw - var(--sidebar-w) - 64px));
  margin-left: 50%;
  transform: translateX(-50%);
  max-width: none;
}
.app--collapsed .embed-frame.is-full {
  width: min(1240px, calc(100vw - 96px));
}
.embed-frame__bar {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
  padding: 5px 8px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-sunken);
}
.embed-frame__btn {
  padding: 3px 9px;
  border-radius: var(--radius);
  color: var(--text-muted);
  font-size: 12px;
  transition: background var(--fast) var(--ease), color var(--fast) var(--ease);
}
.embed-frame__btn:hover {
  background: var(--bg-hover);
  color: var(--text);
}
.embed-frame__hint {
  font-size: 11px;
  color: var(--text-faint);
}
.embed-frame__content {
  flex: 1;
  min-height: 0;
  overflow: auto;
}
/* embeds inside a frame shed their own outer chrome — the frame provides it */
.embed-frame__content > .db,
.embed-frame__content > .wf,
.embed-frame__content > .fin {
  margin: 0;
  border: none;
  border-radius: 0;
  min-height: 100%;
}

/* roomier kanban so it breathes */
.wf__board {
  gap: 16px;
  padding: 18px;
}
.wf__col {
  flex: 0 0 300px;
  width: 300px;
}
.wf__cards {
  gap: 10px;
  min-height: 40px;
}
.wf__card {
  padding: 12px 14px;
}

/* ==========================================================================
   Finance tracker
   ========================================================================== */

.fin {
  width: 100%;
  margin: 6px 0;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  background: var(--bg);
  display: flex;
  flex-direction: column;
}
.fin__toolbar {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
}
.fin__name {
  border: none;
  background: none;
  font-size: 15px;
  font-weight: 600;
  color: var(--text-strong);
  outline: none;
}
.fin__currency {
  width: 44px;
  padding: 5px 8px;
  text-align: center;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-sunken);
  outline: none;
}
.fin__search {
  margin-left: auto;
  width: 160px;
  max-width: 36vw;
  padding: 5px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-sunken);
  font-size: 13px;
  outline: none;
}
.fin__search:focus,
.fin__currency:focus {
  border-color: var(--accent);
}

.fin__summary {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  padding: 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-sunken);
}
.fin__stat {
  min-width: 120px;
  padding: 8px 14px;
  border-radius: var(--radius-lg);
  background: var(--bg-elev);
  border: 1px solid var(--border);
}
.fin__stat-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.02em;
  color: var(--text-faint);
  text-transform: uppercase;
}
.fin__stat-value {
  margin-top: 2px;
  font-size: 18px;
  font-weight: 700;
  color: var(--text-strong);
  font-variant-numeric: tabular-nums;
}

.fin__scroll {
  overflow: auto;
}
.fin__table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
.fin__table th,
.fin__table td {
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  text-align: left;
  vertical-align: middle;
}
.fin__th {
  position: sticky;
  top: 0;
  z-index: 2;
  background: var(--bg-sunken);
}
.fin__th-inner {
  display: flex;
  align-items: center;
  gap: 2px;
  padding: 2px 4px 2px 10px;
}
.fin__th-name {
  flex: 1;
  min-width: 70px;
  border: none;
  background: none;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  outline: none;
}
.fin__fx {
  color: var(--accent);
  font-style: italic;
  font-weight: 700;
  font-size: 13px;
}
.fin__th-menu {
  width: 20px;
  height: 22px;
  border-radius: 4px;
  color: var(--text-faint);
}
.fin__th-menu:hover {
  background: var(--bg-active);
}
.fin__th-dropdown {
  top: 32px;
  left: 6px;
  min-width: 220px;
}
.fin__rownum-head {
  width: 38px;
  background: var(--bg-sunken);
}
.fin__rownum {
  position: relative;
  width: 38px;
  padding: 7px 6px;
  text-align: center;
  font-size: 12px;
  color: var(--text-faint);
  background: var(--bg-sunken);
  font-variant-numeric: tabular-nums;
}
.fin__rowdel {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  color: var(--text-faint);
  background: var(--bg-sunken);
  opacity: 0;
  transition: opacity var(--fast) var(--ease), color var(--fast) var(--ease);
}
.fin__row:hover .fin__rowdel {
  opacity: 1;
}
.fin__rowdel:hover {
  color: var(--danger);
}
.fin__cell {
  min-width: 120px;
  padding: 0;
}
.fin__cell--pad {
  min-width: 0;
  border-right: none;
}
.fin__input {
  width: 100%;
  padding: 8px 10px;
  border: none;
  background: none;
  outline: none;
  font-size: 14px;
}
.fin__input:focus {
  background: var(--accent-soft);
}
.fin__input--num {
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.fin__num {
  display: flex;
  align-items: center;
}
.fin__num-prefix {
  padding-left: 10px;
  color: var(--text-faint);
  font-size: 13px;
}
.fin__formula-cell {
  padding: 8px 10px;
  text-align: right;
  font-variant-numeric: tabular-nums;
  font-weight: 600;
  color: var(--accent);
  background: var(--accent-soft);
}
.fin__empty {
  padding: 18px;
  text-align: center;
  color: var(--text-faint);
}
.fin__foot {
  position: sticky;
  bottom: 0;
  background: var(--bg-sunken);
  font-weight: 600;
}
.fin__foot-cell {
  padding: 8px 10px;
  text-align: right;
  font-variant-numeric: tabular-nums;
  color: var(--text-strong);
}
.fin__foot-val {
  display: inline-flex;
  align-items: baseline;
  gap: 6px;
}
.fin__foot-agg {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  color: var(--text-faint);
}
.fin__addcol {
  width: 42px;
  background: var(--bg-sunken);
}
.fin__addcol-wrap {
  position: relative;
}
.fin__addcol-btn {
  width: 100%;
  padding: 6px;
  color: var(--text-faint);
}
.fin__addcol-btn:hover {
  background: var(--bg-hover);
  color: var(--text);
}
.fin__addcol-menu {
  top: 34px;
  right: 0;
}
.fin__addrow {
  padding: 9px 12px;
  border-top: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 13.5px;
  text-align: left;
  transition: background var(--fast) var(--ease);
}
.fin__addrow:hover {
  background: var(--bg-hover);
}
.fin__menu-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 9px;
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
}
.fin__menu-select {
  width: calc(100% - 12px);
  margin: 2px 6px 6px;
  padding: 5px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-sunken);
  font-size: 13px;
  outline: none;
}
.fin__formula {
  padding: 0 6px 4px;
}
.fin__operand {
  display: flex;
  gap: 4px;
  align-items: center;
}
.fin__operand-num {
  width: 70px;
  margin: 2px 6px 6px 0;
  padding: 5px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-sunken);
  outline: none;
}
.fin__select {
  position: relative;
}
.fin__select-trigger {
  display: flex;
  align-items: center;
  width: 100%;
  min-height: 35px;
  padding: 6px 10px;
  text-align: left;
}
.fin__select-trigger:hover {
  background: var(--bg-hover);
}
.fin__select-placeholder {
  color: var(--text-faint);
  font-size: 13px;
}
.fin__select-pop {
  position: absolute;
  z-index: 60;
  top: 100%;
  left: 0;
  width: 200px;
  padding: 8px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  animation: pop var(--med) var(--ease);
}
.fin__select-input {
  width: 100%;
  margin-bottom: 6px;
  padding: 5px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-sunken);
  outline: none;
}
.fin__select-list {
  display: flex;
  flex-direction: column;
  gap: 1px;
  max-height: 170px;
  overflow-y: auto;
}
.fin__select-opt {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 6px;
  border-radius: var(--radius);
  text-align: left;
}
.fin__select-opt:hover {
  background: var(--bg-hover);
}
.fin__select-check {
  margin-left: auto;
  color: var(--accent);
}
.fin__select-create {
  color: var(--text-muted);
  font-size: 13px;
}

/* ==========================================================================
   Bug fixes: modal scroll + menus above embeds + embed spacing
   ========================================================================== */

.modal {
  display: flex;
  flex-direction: column;
  max-height: 88vh;
}
.modal__body {
  overflow-y: auto;
}
.modal__header,
.modal__footer {
  flex: 0 0 auto;
}

/* dropdowns / menus / slash menu must always sit above embedded boards */
.menu {
  z-index: 1000;
}
/* portaled popovers (table/finance dropdowns) — never clipped by an embed */
.popover {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  padding: 6px;
  animation: pop var(--med) var(--ease);
}
.popover .menu__item {
  display: flex;
  align-items: center;
  width: 100%;
  padding: 7px 9px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  color: var(--text);
  text-align: left;
  transition: background var(--fast) var(--ease);
}
.popover .menu__item:hover {
  background: var(--bg-hover);
}
.popover .menu__item.is-active {
  background: var(--accent-soft);
}
.popover .menu__item--danger {
  color: var(--danger);
}
.popover .menu__item:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.block-actions {
  z-index: 1100;
}
.slash-menu {
  z-index: 1200;
}
/* keep the add-block affordance clickable beneath embeds */
.editor__add-block {
  position: relative;
  z-index: 3;
}
.embed-frame {
  margin: 14px 0 18px;
  isolation: isolate;
}
/* embeds use the frame bar for actions, not the floating column gutter
   (which otherwise lands in the middle of the page over full-width boards) */
.block--embed .block__gutter {
  display: none;
}
.embed-frame__spacer {
  flex: 1;
}
.embed-frame__btn--danger:hover {
  color: var(--danger);
}

/* ==========================================================================
   Page cover photo
   ========================================================================== */

.cover-wrap {
  position: relative;
  width: 100%;
}
.cover {
  position: relative;
  width: 100%;
  height: clamp(140px, 26vh, 260px);
  overflow: hidden;
  background: var(--bg-sunken);
}
.cover__img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  user-select: none;
}
.cover__gradient {
  width: 100%;
  height: 100%;
}
.cover.is-reposition .cover__img {
  cursor: ns-resize;
}
.cover__controls {
  position: absolute;
  right: 14px;
  bottom: 12px;
  z-index: 30;
  display: flex;
  gap: 6px;
  opacity: 0;
  transition: opacity var(--fast) var(--ease);
}
.cover-wrap:hover .cover__controls {
  opacity: 1;
}
.cover__menu-wrap {
  position: relative;
}
.cover__btn {
  padding: 4px 10px;
  border-radius: var(--radius);
  background: color-mix(in srgb, var(--bg) 86%, transparent);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 12.5px;
  backdrop-filter: blur(6px);
  box-shadow: var(--shadow-sm);
  transition: background var(--fast) var(--ease);
}
.cover__btn:hover {
  background: var(--bg);
}
.cover__hint {
  align-self: center;
  padding: 4px 10px;
  border-radius: var(--radius);
  background: color-mix(in srgb, var(--bg) 86%, transparent);
  font-size: 12px;
  color: var(--text-muted);
}
.cover__panel {
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  width: 280px;
  max-height: min(60vh, 420px);
  overflow-y: auto;
  padding: 10px;
}
.cover__swatches {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  padding: 2px 4px 6px;
}
.cover__swatch {
  height: 34px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  transition: transform var(--fast) var(--ease);
}
.cover__swatch:hover {
  transform: scale(1.04);
}
.cover__url-row {
  display: flex;
  gap: 6px;
  padding: 2px 4px 4px;
}
.cover__url-input {
  flex: 1;
  min-width: 0;
  padding: 6px 9px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-sunken);
  outline: none;
}
.cover__url-btn {
  height: auto;
  padding: 0 12px;
}
.editor.has-cover {
  padding-top: 0;
}
/* only the emoji lifts onto the cover edge — controls stay below it */
.editor.has-cover .editor__inner {
  position: relative;
}
.editor.has-cover .editor__emoji {
  margin-top: -46px;
  background: var(--bg);
  border-radius: var(--radius-lg);
  box-shadow: 0 0 0 4px var(--bg);
}
.editor.has-cover .editor__icon-row {
  align-items: flex-end;
}

/* full-width page */
.editor.full-width .editor__inner {
  max-width: min(1400px, 100%);
}

/* page controls toolbar (add cover / width / align) — sits below the cover */
.editor__page-controls {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
  min-height: 28px;
  margin: 2px 0 6px;
  opacity: 0;
  transition: opacity var(--fast) var(--ease);
}
.editor:hover .editor__page-controls {
  opacity: 1;
}
.editor__page-control-wrap {
  position: relative;
}
.editor__page-control {
  padding: 4px 10px;
  border-radius: var(--radius);
  color: var(--text-muted);
  font-size: 13px;
  border: 1px solid transparent;
  transition: background var(--fast) var(--ease), color var(--fast) var(--ease), border-color var(--fast) var(--ease);
}
.editor__page-control:hover {
  background: var(--bg-hover);
  color: var(--text);
  border-color: var(--border);

const STORAGE_KEY = "tracker.workspace.v1";
function isValidWorkspace(v) {
  if (!v || typeof v !== "object") return false;
  const arrays = ["pages", "blocks", "workflows", "workflowStages", "workflowCards", "databases", "databaseRows", "favorites", "recents"];
  if (!arrays.every(k => Array.isArray(v[k]))) return false;
  if (typeof v.version !== "number") return false;
  if (!v.settings || typeof v.settings !== "object") return false;
  return true;
}
function migrate(raw) {
  let ws = raw;
  if (ws.version !== SCHEMA_VERSION) ws = { ...ws, version: SCHEMA_VERSION };
  const fresh = createSeedWorkspace();
  return { ...fresh, ...ws, settings: { ...fresh.settings, ...ws.settings } };
}
function loadWorkspace() {
  let stored = null;
  try { stored = localStorage.getItem(STORAGE_KEY); }
  catch { return { workspace: createSeedWorkspace(), recovered: false, firstRun: true }; }
  if (stored == null) { const seed = createSeedWorkspace(); saveWorkspace(seed); return { workspace: seed, recovered: false, firstRun: true }; }
  try {
    const parsed = JSON.parse(stored);
    if (!isValidWorkspace(parsed)) return { workspace: createSeedWorkspace(), recovered: true, firstRun: false };
    return { workspace: migrate(parsed), recovered: false, firstRun: false };
  } catch { return { workspace: createSeedWorkspace(), recovered: true, firstRun: false }; }
}
function saveWorkspace(ws) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(ws)); return true; } catch { return false; } }
function exportWorkspace(ws) { downloadText("tracker-workspace.json", JSON.stringify(ws, null, 2)); }
async function importWorkspaceFile(file) {
  try {
    const text = await file.text();
    const parsed = JSON.parse(text);
    if (!isValidWorkspace(parsed)) return { ok: false, error: "That file is not a valid Tracker workspace." };
    return { ok: true, workspace: migrate(parsed) };
  } catch { return { ok: false, error: "Could not read that file. Is it valid JSON?" }; }
}

const ToastContext = createContext(null);
function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const nextId = useRef(1);
  const show = useCallback((message, kind = "success") => {
    const id = nextId.current++;
    setToasts(l => [...l, { id, message, kind }]);
    window.setTimeout(() => setToasts(l => l.filter(t => t.id !== id)), 2800);
  }, []);
  const dismiss = useCallback(id => setToasts(l => l.filter(t => t.id !== id)), []);
  const value = useMemo(() => ({ show }), [show]);
  return (
    <ToastContext.Provider value={value}>
      {children}
      <div className="toast-container" role="status" aria-live="polite">
        {toasts.map(t => (
          <button key={t.id} type="button" className={`toast toast--${t.kind}`} onClick={() => dismiss(t.id)}>
            <span className="toast__dot" aria-hidden /><span className="toast__msg">{t.message}</span>
          </button>
        ))}
      </div>
    </ToastContext.Provider>
  );
}
const useToast = () => useContext(ToastContext);

function Popover({ anchorRef, onClose, className, width = 220, align = "left", children }) {

    left = Math.max(8, Math.min(left, vw - width - 8));
    const spaceBelow = vh - r.bottom - 8, spaceAbove = r.top - 8;
    const base = { position: "fixed", left, width, zIndex: 1500, overflowY: "auto" };
    if (spaceBelow >= 200 || spaceBelow >= spaceAbove) setStyle({ ...base, top: r.bottom + 4, maxHeight: Math.max(160, spaceBelow) });
    else setStyle({ ...base, bottom: vh - r.top + 4, maxHeight: Math.max(160, spaceAbove) });
  }, [anchorRef, width, align]);
  useEffect(() => {
    const el = anchorRef.current;
    const onDoc = e => { const t = e.target; if (ref.current && !ref.current.contains(t) && el && !el.contains(t)) onClose(); };
    const onScroll = () => onClose();
    const onKey = e => { if (e.key === "Escape") onClose(); };
    document.addEventListener("mousedown", onDoc);
    window.addEventListener("scroll", onScroll, true);
    window.addEventListener("resize", onClose);
    document.addEventListener("keydown", onKey);
    return () => { document.removeEventListener("mousedown", onDoc); window.removeEventListener("scroll", onScroll, true); window.removeEventListener("resize", onClose); document.removeEventListener("keydown", onKey); };
  }, [anchorRef, onClose]);
  if (!style) return null;
  return ReactDOM.createPortal(<div ref={ref} className={`popover ${className || ""}`} style={style}>{children}</div>, document.body);
}

/* ===================== CoverPhoto ===================== */
function CoverPhoto({ page }) {
  const store = useStore();
  const cover = page.cover;
  const [menuOpen, setMenuOpen] = useState(false);
  const [reposition, setReposition] = useState(false);
  const dragY = useRef(null);
  if (!cover) return null;
  const isImage = cover.kind === "url" || cover.kind === "data";
  const y = cover.y ?? 50;
  const onPointerDown = e => { if (!reposition || !isImage) return; dragY.current = e.clientY; e.target.setPointerCapture && e.target.setPointerCapture(e.pointerId); };
  const onPointerMove = e => { if (dragY.current == null) return; const delta = e.clientY - dragY.current; dragY.current = e.clientY; store.setPageCover(page.id, { ...cover, y: Math.max(0, Math.min(100, y - delta * 0.4)) }); };
  const onPointerUp = () => { dragY.current = null; };
  return (
    <div className="cover-wrap">
      <div className={`cover ${reposition ? "is-reposition" : ""}`}>
        {isImage
          ? <img className="cover__img" src={cover.src} alt="" style={{ objectPosition: `center ${y}%` }} onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp} draggable={false} />
          : <div className="cover__gradient" style={{ background: cover.src }} />}
      </div>
      <div className="cover__controls">
        {reposition ? (
          <>
            <span className="cover__hint">Drag image to reposition</span>
            <button className="cover__btn" onClick={() => setReposition(false)}>Save position</button>
          </>
        ) : (
          <>
            <div className="cover__menu-wrap">
              <button className="cover__btn" onClick={() => setMenuOpen(v => !v)}>Change cover</button>
              {menuOpen && <CoverMenu page={page} onClose={() => setMenuOpen(false)} />}
            </div>
            {isImage && <button className="cover__btn" onClick={() => setReposition(true)}>Reposition</button>}
            <button className="cover__btn" onClick={() => store.setPageCover(page.id, undefined)}>Remove</button>
          </>
        )}
      </div>
    </div>
  );
}
function CoverMenu({ page, onClose }) {
  const store = useStore();
  const toast = useToast();
  const ref = useRef(null);
  const fileRef = useRef(null);
  const [url, setUrl] = useState("");
  useEffect(() => { const onDoc = e => { if (ref.current && !ref.current.contains(e.target)) onClose(); }; document.addEventListener("mousedown", onDoc); return () => document.removeEventListener("mousedown", onDoc); }, [onClose]);
  const apply = cover => { store.setPageCover(page.id, cover); onClose(); };
  const onFile = async e => {
    const file = e.target.files && e.target.files[0]; e.target.value = "";
    if (!file) return;
    if (!file.type.startsWith("image/")) { toast.show("Please choose an image file.", "error"); return; }
    try {
      const dataUrl = await compressImageFile(file);
      if (dataUrl.length > 1400000) { toast.show("That image is large — try a smaller one.", "error"); return; }
      apply({ kind: "data", src: dataUrl, y: 50 }); toast.show("Cover updated");
    } catch { toast.show("Could not process that image.", "error"); }
  };
  return (
    <div className="menu cover__panel" ref={ref}>
      <div className="menu__label">Gallery</div>
      <div className="cover__swatches">
        {COVER_GRADIENTS.map(g => <button key={g} className="cover__swatch" style={{ background: g }} onClick={() => apply({ kind: "gradient", src: g })} aria-label="Use gradient cover" />)}
      </div>
      <div className="menu__sep" />
      <div className="menu__label">Image URL</div>
      <div className="cover__url-row">
        <input className="cover__url-input" placeholder="https://…" value={url} onChange={e => setUrl(e.target.value)} onKeyDown={e => { if (e.key === "Enter" && url.trim()) apply({ kind: "url", src: url.trim(), y: 50 }); }} />
        <button className="btn btn--primary cover__url-btn" disabled={!url.trim()} onClick={() => apply({ kind: "url", src: url.trim(), y: 50 })}>Add</button>
      </div>
      <div className="menu__sep" />
      <button className="menu__item" onClick={() => fileRef.current && fileRef.current.click()}>Upload from device…</button>
      <input ref={fileRef} type="file" accept="image/*" style={{ display: "none" }} onChange={onFile} />
    </div>
  );
}

/* ===================== Editor ===================== */

  const [dragIndex, setDragIndex] = useState(null);
  const [dropIndex, setDropIndex] = useState(null);
  const [saveState, setSaveState] = useState("idle");
  const titleRef = useRef(null);
  const firstRender = useRef(true);
  useEffect(() => {
    if (firstRender.current) { firstRender.current = false; return; }
    setSaveState("saving"); const t = window.setTimeout(() => setSaveState("idle"), 700); return () => window.clearTimeout(t);
  }, [page.updatedAt]);
  useEffect(() => { const el = titleRef.current; if (el) { el.style.height = "auto"; el.style.height = el.scrollHeight + "px"; } }, [page.title, page.id]);
  const requestFocus = useCallback((id, pos = "end") => setPendingFocus({ id, pos }), []);

  }, [page.id, store]);
  const handleTitleKey = e => {
    if (e.key === "Enter") { e.preventDefault(); const first = blocks[0]; if (first) requestFocus(first.id, "start"); else { const nid = store.addBlock(page.id, null, "paragraph"); requestFocus(nid, "start"); } }
  };
  const aligns = ["left", "center", "right"];
  const alignIcon = { left: "⬅", center: "↔", right: "➡" };
