          <span className={`editor__save editor__save--${saveState}`}>{saveState === "saving" ? "Saving…" : `Saved · ${formatTime(page.updatedAt)}`}</span>
        </div>
        <div className="editor__page-controls">
          {!page.cover && (
            <div className="editor__page-control-wrap">
              <button className="editor__page-control" onClick={() => setShowCoverMenu(v => !v)}>🖼 Add cover</button>
              {showCoverMenu && <CoverMenu page={page} onClose={() => setShowCoverMenu(false)} />}
            </div>
          )}
          <button className="editor__page-control" onClick={() => store.setPageFullWidth(page.id, !page.fullWidth)} title="Toggle page width">{page.fullWidth ? "→← Fit width" : "↔ Full width"}</button>
          <div className="editor__align" role="group" aria-label="Title alignment">
            <span className="editor__align-label">Title</span>
            {aligns.map(a => <button key={a} className={`editor__align-btn ${(page.titleAlign || "left") === a ? "is-active" : ""}`} onClick={() => store.setPageTitleAlign(page.id, a)} title={`Align ${a}`}>{alignIcon[a]}</button>)}
          </div>
        </div>
        <textarea ref={titleRef} className="editor__title" placeholder="Untitled" rows={1} style={{ textAlign: page.titleAlign || "left" }} value={page.title} onChange={e => store.renamePage(page.id, e.target.value)} onKeyDown={handleTitleKey} />
        <div className="editor__blocks">
          {blocks.map((block, i) => {
            if (block.type === "numbered") runningNumber += 1; else runningNumber = 0;
            return (
              <BlockRow key={block.id} block={block} index={i} total={blocks.length} ordinal={runningNumber}
                prevBlockId={i > 0 ? blocks[i - 1].id : null} shouldFocus={pendingFocus?.id === block.id} focusPos={pendingFocus?.pos ?? "end"}
                onFocused={clearFocus} requestFocus={requestFocus} onDragStart={onDragStart} onDragEnterRow={onDragEnterRow} onDrop={onDrop} onDragEnd={onDragEnd}
                isDropTarget={dropIndex === i && dragIndex !== null && dragIndex !== i} />
            );
          })}
          {blocks.length === 0 && (
            <div className="editor__empty"><p>This page is empty.</p>
              <button className="btn btn--primary" onClick={() => { const nid = store.addBlock(page.id, null, "paragraph"); requestFocus(nid, "start"); }}>Add a block</button></div>
          )}
        </div>
        {blocks.length > 0 && (
          <button className="editor__add-block" onClick={() => { const last = blocks[blocks.length - 1]; const nid = store.addBlock(page.id, last ? last.id : null, "paragraph"); requestFocus(nid, "start"); }}>＋ Add a block</button>
        )}
      </div>
    </article>
  );
}

/* ===================== DatabaseTable ===================== */
const COLUMN_TYPES = [
  { type: "text", label: "Text" }, { type: "number", label: "Number" }, { type: "select", label: "Select" },
  { type: "multiSelect", label: "Multi-select" }, { type: "date", label: "Date" }, { type: "checkbox", label: "Checkbox" }, { type: "url", label: "URL" },
];
function cellToText(v) { if (v === null || v === undefined) return ""; if (Array.isArray(v)) return v.join(" "); return String(v); }
function compareCells(a, b, type) {
  if (type === "number") { const an = typeof a === "number" ? a : -Infinity; const bn = typeof b === "number" ? b : -Infinity; return an - bn; }
  if (type === "checkbox") return (a ? 1 : 0) - (b ? 1 : 0);
  return cellToText(a).localeCompare(cellToText(b));
}
function DatabaseTable({ databaseId }) {
  const store = useStore();
  const db = store.ws.databases.find(d => d.id === databaseId);
  const rows = useMemo(() => store.ws.databaseRows.filter(r => r.databaseId === databaseId).sort((a, b) => a.order - b.order), [store.ws.databaseRows, databaseId]);
  const [query, setQuery] = useState("");
  const [sort, setSort] = useState(null);
  const [addColOpen, setAddColOpen] = useState(false);
  const addColBtn = useRef(null);
  if (!db) return <div className="embed-missing">Database not found</div>;
  const filtered = rows.filter(r => db.columns.some(c => matches(cellToText(r.cells[c.id]), query)));
  const sorted = sort ? [...filtered].sort((a, b) => { const col = db.columns.find(c => c.id === sort.colId); const cmp = compareCells(a.cells[sort.colId], b.cells[sort.colId], col && col.type); return sort.dir === "asc" ? cmp : -cmp; }) : filtered;
  return (
    <div className="db" contentEditable={false}>
      <div className="db__toolbar">
        <input className="db__name" value={db.name} onChange={e => store.renameDatabase(db.id, e.target.value)} aria-label="Database name" />
        <div className="db__toolbar-right"><input className="db__search" placeholder="Search rows…" value={query} onChange={e => setQuery(e.target.value)} /></div>
      </div>
      <div className="db__scroll">
        <table className="db__table">
          <thead>
            <tr>
              <th className="db__rownum-head" />
              {db.columns.map(col => (
                <ColumnHeader key={col.id} databaseId={db.id} column={col} sort={sort && sort.colId === col.id ? sort.dir : null}
                  onSort={dir => setSort({ colId: col.id, dir })} onClearSort={() => setSort(null)} canDelete={db.columns.length > 1} />
              ))}
              <th className="db__addcol"><div className="db__addcol-wrap">
                <button ref={addColBtn} className="db__addcol-btn" onClick={() => setAddColOpen(v => !v)} title="Add column">＋</button>
                {addColOpen && <TypeMenu anchorRef={addColBtn} onPick={t => { store.addColumn(db.id, t); setAddColOpen(false); }} onClose={() => setAddColOpen(false)} />}
              </div></th>
            </tr>
          </thead>
          <tbody>
            {sorted.map((row, i) => (
              <tr key={row.id} className="db__row">
                <td className="db__rownum"><span>{i + 1}</span><button className="db__rowdel" title="Delete row" onClick={() => store.deleteRow(row.id)}>✕</button></td>
                {db.columns.map(col => (
                  <td key={col.id} className="db__cell" data-type={col.type}>
                    <Cell column={col} value={row.cells[col.id] ?? null} onChange={v => store.updateCell(row.id, col.id, v)}
                      onAddOption={opt => { const options = Array.from(new Set([...(col.options || []), opt])); store.updateColumn(db.id, col.id, { options }); }} />
                  </td>
                ))}
                <td className="db__cell db__cell--pad" />
              </tr>
            ))}
            {sorted.length === 0 && <tr><td className="db__empty" colSpan={db.columns.length + 2}>{query ? "No rows match your search." : "No rows yet."}</td></tr>}
          </tbody>
        </table>
      </div>
      <button className="db__addrow" onClick={() => store.addRow(db.id)}>＋ New row</button>
    </div>
  );
}
function ColumnHeader({ databaseId, column, sort, onSort, onClearSort, canDelete }) {
  const store = useStore();
  const [menuOpen, setMenuOpen] = useState(false);
  const [typeOpen, setTypeOpen] = useState(false);
  const menuBtn = useRef(null);
  return (
    <th className="db__th">
      <div className="db__th-inner">
        <input className="db__th-name" value={column.name} onChange={e => store.renameColumn(databaseId, column.id, e.target.value)} />
        {sort && <span className="db__sort-mark">{sort === "asc" ? "↑" : "↓"}</span>}
        <button ref={menuBtn} className="db__th-menu" onClick={() => setMenuOpen(v => !v)} title="Column options">⌄</button>
      </div>
      {menuOpen && (
        <Popover anchorRef={menuBtn} align="left" width={210} onClose={() => { setMenuOpen(false); setTypeOpen(false); }}>
          <button className="menu__item" onClick={() => { onSort("asc"); setMenuOpen(false); }}>Sort ascending</button>
          <button className="menu__item" onClick={() => { onSort("desc"); setMenuOpen(false); }}>Sort descending</button>
          <button className="menu__item" onClick={() => { onClearSort(); setMenuOpen(false); }}>Clear sort</button>
          <div className="menu__sep" />
          <button className="menu__item" onClick={() => setTypeOpen(v => !v)}>Change type ›</button>
          {typeOpen && (
            <div className="menu db__type-sub">
              {COLUMN_TYPES.map(t => (
                <button key={t.type} className={`menu__item ${t.type === column.type ? "is-active" : ""}`}
                  onClick={() => { store.updateColumn(databaseId, column.id, { type: t.type, options: t.type === "select" || t.type === "multiSelect" ? column.options || [] : undefined }); setTypeOpen(false); setMenuOpen(false); }}>{t.label}</button>
              ))}
            </div>
          )}
          <div className="menu__sep" />
          <button className="menu__item menu__item--danger" disabled={!canDelete} onClick={() => { store.deleteColumn(databaseId, column.id); setMenuOpen(false); }}>Delete column</button>
        </Popover>
      )}
    </th>
  );
}
function Cell({ column, value, onChange, onAddOption }) {
  switch (column.type) {
    case "number": return <input className="db__input" type="number" value={value === null || value === undefined ? "" : String(value)} onChange={e => onChange(e.target.value === "" ? null : Number(e.target.value))} />;
    case "checkbox": return <input className="db__checkbox" type="checkbox" checked={!!value} onChange={e => onChange(e.target.checked)} />;
    case "date": return <input className="db__input" type="date" value={typeof value === "string" ? value : ""} onChange={e => onChange(e.target.value)} />;
    case "url": return (
      <div className="db__url">
        <input className="db__input" type="url" placeholder="https://" value={typeof value === "string" ? value : ""} onChange={e => onChange(e.target.value)} />
        {typeof value === "string" && value && <a className="db__url-link" href={value} target="_blank" rel="noreferrer" title="Open">↗</a>}
      </div>);
    case "select": return <SelectCell multi={false} options={column.options || []} value={value} onChange={onChange} onAddOption={onAddOption} />;
    case "multiSelect": return <SelectCell multi options={column.options || []} value={value} onChange={onChange} onAddOption={onAddOption} />;
    default: return <input className="db__input" value={typeof value === "string" ? value : ""} onChange={e => onChange(e.target.value)} />;
  }
}
function SelectCell({ multi, options, value, onChange, onAddOption }) {
  const [open, setOpen] = useState(false);
  const [draft, setDraft] = useState("");
  const triggerRef = useRef(null);
  const selected = multi ? (Array.isArray(value) ? value : []) : (typeof value === "string" && value ? [value] : []);
  const toggle = opt => {
    if (multi) onChange(selected.includes(opt) ? selected.filter(s => s !== opt) : [...selected, opt]);
    else { onChange(selected[0] === opt ? null : opt); setOpen(false); }
  };
  const add = () => { const v = draft.trim(); if (!v) return; if (!options.includes(v)) onAddOption(v); toggle(v); setDraft(""); };
  return (
    <div className="db__select">
      <button ref={triggerRef} className="db__select-trigger" onClick={() => setOpen(v => !v)}>
        {selected.length === 0 ? <span className="db__select-placeholder">Empty</span> : selected.map(s => <span key={s} className="chip">{s}</span>)}
      </button>
      {open && (
        <Popover anchorRef={triggerRef} className="db__select-pop" width={220} onClose={() => setOpen(false)}>
          <input className="db__select-input" placeholder={multi ? "Add or pick…" : "Pick or add…"} value={draft} autoFocus onChange={e => setDraft(e.target.value)} onKeyDown={e => { if (e.key === "Enter") add(); }} />
          <div className="db__select-list">
            {options.filter(o => matches(o, draft)).map(o => (
              <button key={o} className={`db__select-opt ${selected.includes(o) ? "is-selected" : ""}`} onClick={() => toggle(o)}>
                <span className="chip">{o}</span>{selected.includes(o) && <span className="db__select-check">✓</span>}
              </button>
            ))}
            {draft.trim() && !options.includes(draft.trim()) && <button className="db__select-opt db__select-create" onClick={add}>Create “{draft.trim()}”</button>}
            {options.length === 0 && !draft && <div className="db__select-empty">Type to add an option</div>}
          </div>
        </Popover>
      )}
    </div>
  );
}
function TypeMenu({ anchorRef, onPick, onClose }) {
  return (
    <Popover anchorRef={anchorRef} align="right" width={180} onClose={onClose}>
      <div className="menu__label">New column</div>
      {COLUMN_TYPES.map(t => <button key={t.type} className="menu__item" onClick={() => onPick(t.type)}>{t.label}</button>)}
    </Popover>
  );
}

/* ===================== WorkflowBoard ===================== */
function isoOf(d) {
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${d.getFullYear()}-${m}-${day}`;
}
function WorkflowBoard({ workflowId }) {
  const store = useStore();
  const workflow = store.ws.workflows.find(w => w.id === workflowId);
  const stages = useMemo(() => store.ws.workflowStages.filter(s => s.workflowId === workflowId).sort((a, b) => a.order - b.order), [store.ws.workflowStages, workflowId]);
  const allCards = useMemo(() => store.ws.workflowCards.filter(c => c.workflowId === workflowId), [store.ws.workflowCards, workflowId]);
  const [view, setView] = useState("board");
  const [query, setQuery] = useState("");
  const [priorityFilter, setPriorityFilter] = useState("all");
  const [editingCardId, setEditingCardId] = useState(null);
  const [dragCardId, setDragCardId] = useState(null);
  const [dropTarget, setDropTarget] = useState(null);
  const [calMonth, setCalMonth] = useState(() => { const d = new Date(); return new Date(d.getFullYear(), d.getMonth(), 1); });
  if (!workflow) return <div className="embed-missing">Workflow not found</div>;
  const cardMatches = c => {
    if (priorityFilter !== "all" && c.priority !== priorityFilter) return false;
    if (!query) return true;
    return matches(c.title, query) || matches(c.description, query) || matches(c.assignee, query) || matches(c.tags.join(" "), query);
  };
  const cardsByStage = stageId => allCards.filter(c => c.stageId === stageId && cardMatches(c)).sort((a, b) => a.order - b.order);

function CalendarView({ month, cards, onPrev, onNext, onToday, onOpen, onSetDate, onAddOnDate }) {
  const [dragId, setDragId] = useState(null);
  const year = month.getFullYear(), m = month.getMonth();
  const first = new Date(year, m, 1);
  const gridStart = new Date(year, m, 1 - first.getDay());
  const todayIso = isoOf(new Date());
  const days = [];
  for (let i = 0; i < 42; i++) days.push(new Date(gridStart.getFullYear(), gridStart.getMonth(), gridStart.getDate() + i));
  const byDate = new Map();
  cards.forEach(c => { if (!c.dueDate) return; const arr = byDate.get(c.dueDate) || []; arr.push(c); byDate.set(c.dueDate, arr); });
  const unscheduled = cards.filter(c => !c.dueDate);
  const weekdays = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
  return (
    <div className="cal">
      <div className="cal__head">
        <div className="cal__title">{month.toLocaleDateString(undefined, { month: "long", year: "numeric" })}</div>
        <div className="cal__nav">
          <button className="cal__nav-btn" onClick={onPrev} aria-label="Previous month">‹</button>
          <button className="cal__today" onClick={onToday}>Today</button>
          <button className="cal__nav-btn" onClick={onNext} aria-label="Next month">›</button>
        </div>
      </div>
      <div className="cal__weekdays">{weekdays.map(w => <div key={w} className="cal__weekday">{w}</div>)}</div>
      <div className="cal__grid">
        {days.map(d => {
          const iso = isoOf(d), inMonth = d.getMonth() === m, dayCards = byDate.get(iso) || [];
          return (
            <div key={iso} className={`cal__cell ${inMonth ? "" : "is-out"} ${iso === todayIso ? "is-today" : ""}`}
              onDragOver={e => { if (dragId) e.preventDefault(); }}
              onDrop={e => { e.preventDefault(); if (dragId) onSetDate(dragId, iso); setDragId(null); }}>
              <div className="cal__date"><span>{d.getDate()}</span><button className="cal__add" title="Add card" onClick={() => onAddOnDate(iso)}>＋</button></div>
              <div className="cal__events">
                {dayCards.map(c => (
                  <button key={c.id} className={`cal__event prio-edge--${c.priority}`} draggable onDragStart={() => setDragId(c.id)} onDragEnd={() => setDragId(null)} onClick={() => onOpen(c.id)} title={c.title}>
                    <span className={`prio-dot prio-dot--${c.priority}`} /><span className="cal__event-title">{c.title}</span>
                  </button>
                ))}
              </div>
            </div>
          );
        })}
      </div>
      {unscheduled.length > 0 && (
        <div className="cal__unscheduled">
          <div className="cal__unscheduled-label">Unscheduled · drag onto a day</div>
          <div className="cal__unscheduled-list">
            {unscheduled.map(c => <button key={c.id} className="cal__chip" draggable onDragStart={() => setDragId(c.id)} onDragEnd={() => setDragId(null)} onClick={() => onOpen(c.id)}><span className={`prio-dot prio-dot--${c.priority}`} />{c.title}</button>)}
          </div>
        </div>
      )}
    </div>
  );
}

/* ===================== ResizableEmbed ===================== */
function ResizableEmbed({ block, defaultHeight, children }) {
  const store = useStore();
  const ref = useRef(null);
  const full = !!block.props.full;
  const size = block.props.size;
  useEffect(() => {
    const el = ref.current;
    if (!el || typeof ResizeObserver === "undefined") return;
    let timer = null;
    const ro = new ResizeObserver(() => {
      if (timer) clearTimeout(timer);
      timer = setTimeout(() => {
        const h = Math.round(el.offsetHeight);
        const w = full ? (block.props.size && block.props.size.w) : Math.round(el.offsetWidth);
        const prev = block.props.size;
        const wChanged = !full && Math.abs(((prev && prev.w) || 0) - (w || 0)) > 1;
        const hChanged = Math.abs(((prev && prev.h) || 0) - h) > 1;
        if (wChanged || hChanged) store.updateBlock(block.id, { props: { size: { w, h } } });
      }, 350);
    });
    ro.observe(el);
    return () => { if (timer) clearTimeout(timer); ro.disconnect(); };
  }, [block.id, full]);
  const style = { height: (size && size.h) || defaultHeight, width: full ? undefined : (size && size.w) || undefined };
  return (
    <div className={`embed-frame ${full ? "is-full" : ""}`} ref={ref} style={style}>
      <div className="embed-frame__bar">
        <button className="embed-frame__btn" title={full ? "Fit to page" : "Expand to full width"} onClick={() => store.updateBlock(block.id, { props: { full: !full } })}>{full ? "⤡ Fit" : "⤢ Full width"}</button>
        <button className="embed-frame__btn" title="Reset size" onClick={() => store.updateBlock(block.id, { props: { size: undefined, full: false } })}>↺ Reset</button>
        <span className="embed-frame__hint">drag corner ↘</span>
        <span className="embed-frame__spacer" />
        <button className="embed-frame__btn" title="Add a block below" onClick={() => store.addBlock(block.pageId, block.id, "paragraph")}>＋ Add block</button>
        <button className="embed-frame__btn" title="Duplicate" onClick={() => store.duplicateBlock(block.id)}>⧉</button>
        <button className="embed-frame__btn embed-frame__btn--danger" title="Delete" onClick={() => store.deleteBlock(block.id)}>🗑</button>
      </div>
      <div className="embed-frame__content">{children}</div>
    </div>
  );
}

/* ===================== FinanceTracker ===================== */
const FIN_TYPES = [
  { type: "text", label: "Text" }, { type: "number", label: "Number" }, { type: "date", label: "Date" },
  { type: "select", label: "Select" }, { type: "formula", label: "Formula (auto)" },
];
const AGGS = ["none", "sum", "avg", "min", "max", "count"];
const OPS = [{ op: "+", label: "+  add" }, { op: "-", label: "−  subtract" }, { op: "*", label: "×  multiply" }, { op: "/", label: "÷  divide" }];
function finCellText(col, row) {
  if (col.type === "formula") return String(cellNumber(col, row));
  const v = row.cells[col.id];
  if (v === null || v === undefined) return "";
  return Array.isArray(v) ? v.join(" ") : String(v);
}
function FinanceTracker({ financeId }) {
  const store = useStore();

  const [query, setQuery] = useState("");
  const [addColOpen, setAddColOpen] = useState(false);
  const addColBtn = useRef(null);
  const rows = useMemo(() => finance ? [...finance.rows].sort((a, b) => a.order - b.order) : [], [finance]);
  if (!finance) return <div className="embed-missing">Finance tracker not found</div>;
  const filtered = rows.filter(r => finance.columns.some(c => matches(finCellText(c, r), query)));
  const numCols = numericColumns(finance);
  return (
    <div className="fin" contentEditable={false}>
      <div className="fin__toolbar">
        <input className="fin__name" value={finance.name} onChange={e => store.renameFinance(finance.id, e.target.value)} aria-label="Finance tracker name" />
        <input className="fin__currency" value={finance.currency} maxLength={3} title="Currency symbol" onChange={e => store.setFinanceCurrency(finance.id, e.target.value)} />
        <input className="fin__search" placeholder="Search…" value={query} onChange={e => setQuery(e.target.value)} />
      </div>
      <div className="fin__summary">
        {numCols.filter(c => c.agg !== "none").map(c => {

          return (
            <div className="fin__stat" key={c.id}>
              <div className="fin__stat-label">{AGG_LABEL[c.agg]} · {c.name}</div>
              <div className="fin__stat-value">{val === null ? "—" : formatMoney(val, finance.currency, c.money)}</div>
            </div>
          );
        })}
        <div className="fin__stat"><div className="fin__stat-label">Rows</div><div className="fin__stat-value">{filtered.length}</div></div>
      </div>
      <div className="fin__scroll">
        <table className="fin__table">
          <thead>
            <tr>
              <th className="fin__rownum-head" />
              {finance.columns.map(col => <FinColumnHeader key={col.id} financeId={finance.id} column={col} allColumns={finance.columns} />)}
              <th className="fin__addcol"><div className="fin__addcol-wrap">
                <button ref={addColBtn} className="fin__addcol-btn" onClick={() => setAddColOpen(v => !v)} title="Add column">＋</button>
                {addColOpen && <FinTypeMenu anchorRef={addColBtn} onPick={t => { store.addFinanceColumn(finance.id, t); setAddColOpen(false); }} onClose={() => setAddColOpen(false)} />}
              </div></th>
            </tr>
          </thead>
          <tbody>
            {filtered.map((row, i) => (
              <tr key={row.id} className="fin__row">
                <td className="fin__rownum"><span>{i + 1}</span><button className="fin__rowdel" title="Delete row" onClick={() => store.deleteFinanceRow(finance.id, row.id)}>✕</button></td>
                {finance.columns.map(col => (
                  <td key={col.id} className="fin__cell" data-type={col.type}>
                    <FinCell column={col} row={row} currency={finance.currency}
                      onChange={v => store.updateFinanceCell(finance.id, row.id, col.id, v)}

                  </td>
                ))}
                <td className="fin__cell fin__cell--pad" />
              </tr>
            ))}
            {filtered.length === 0 && <tr><td className="fin__empty" colSpan={finance.columns.length + 2}>{query ? "No rows match." : "No rows yet — add one below."}</td></tr>}
          </tbody>
          <tfoot>
            <tr className="fin__foot">
              <td className="fin__rownum">Σ</td>
              {finance.columns.map(col => {
                const val = isNumericColumn(col) && col.agg !== "none" ? aggregate(col, filtered, col.agg) : null;
                return <td key={col.id} className="fin__foot-cell">{val !== null && <span className="fin__foot-val"><span className="fin__foot-agg">{AGG_LABEL[col.agg]}</span>{formatMoney(val, finance.currency, col.money)}</span>}</td>;
              })}
              <td className="fin__cell fin__cell--pad" />
            </tr>
          </tfoot>
        </table>
      </div>

    </div>
  );

function FormulaEditor({ column, numCols, onChange }) {
  const formula = column.formula || {
    left: numCols[0] ? { kind: "col", col: numCols[0].id } : { kind: "const", value: 0 },
    op: "*",
    right: numCols[1] ? { kind: "col", col: numCols[1].id } : { kind: "const", value: 0 },
  };
  const renderOperand = side => {
    const op = formula[side];
    return (
      <div className="fin__operand">
        <select className="fin__menu-select" value={op.kind === "col" ? op.col : "__const"}
          onChange={e => { const v = e.target.value; const next = v === "__const" ? { kind: "const", value: 0 } : { kind: "col", col: v }; onChange({ ...formula, [side]: next }); }}>
          {numCols.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
          <option value="__const">Number…</option>
        </select>
        {op.kind === "const" && <input className="fin__operand-num" type="number" value={op.value} onChange={e => onChange({ ...formula, [side]: { kind: "const", value: Number(e.target.value) || 0 } })} />}
      </div>
    );
  };
  return (
    <div className="fin__formula">
      <div className="menu__label">Formula</div>
      {renderOperand("left")}
      <select className="fin__menu-select" value={formula.op} onChange={e => onChange({ ...formula, op: e.target.value })}>{OPS.map(o => <option key={o.op} value={o.op}>{o.label}</option>)}</select>
      {renderOperand("right")}
    </div>
  );
}
function FinCell({ column, row, currency, onChange, onAddOption }) {
  const value = row.cells[column.id] ?? null;
  switch (column.type) {
    case "formula": return <div className="fin__formula-cell">{formatMoney(computeFormula(column, row), currency, column.money)}</div>;
    case "number": return (
      <div className="fin__num">
        {column.money && <span className="fin__num-prefix">{currency}</span>}
        <input className="fin__input fin__input--num" type="number" value={value === null || value === undefined ? "" : String(value)} onChange={e => onChange(e.target.value === "" ? null : Number(e.target.value))} />
      </div>);
    case "date": return <input className="fin__input" type="date" value={typeof value === "string" ? value : ""} onChange={e => onChange(e.target.value)} />;
    case "select": return <FinSelect options={column.options || []} value={typeof value === "string" ? value : ""} onChange={onChange} onAddOption={onAddOption} />;
    default: return <input className="fin__input" value={typeof value === "string" ? value : ""} onChange={e => onChange(e.target.value)} />;
  }
}
function FinSelect({ options, value, onChange, onAddOption }) {
  const [open, setOpen] = useState(false);
  const [draft, setDraft] = useState("");
  const triggerRef = useRef(null);
  const add = () => { const v = draft.trim(); if (!v) return; if (!options.includes(v)) onAddOption(v); onChange(v); setDraft(""); setOpen(false); };
  return (
    <div className="fin__select">
      <button ref={triggerRef} className="fin__select-trigger" onClick={() => setOpen(v => !v)}>{value ? <span className="chip">{value}</span> : <span className="fin__select-placeholder">Empty</span>}</button>
      {open && (
        <Popover anchorRef={triggerRef} className="fin__select-pop" width={200} onClose={() => setOpen(false)}>
          <input className="fin__select-input" placeholder="Pick or add…" value={draft} autoFocus onChange={e => setDraft(e.target.value)} onKeyDown={e => { if (e.key === "Enter") add(); }} />
          <div className="fin__select-list">
            {options.filter(o => matches(o, draft)).map(o => (
              <button key={o} className="fin__select-opt" onClick={() => { onChange(value === o ? null : o); setOpen(false); }}>
                <span className="chip">{o}</span>{value === o && <span className="fin__select-check">✓</span>}
              </button>
            ))}
            {draft.trim() && !options.includes(draft.trim()) && <button className="fin__select-opt fin__select-create" onClick={add}>Create “{draft.trim()}”</button>}
          </div>
        </Popover>
      )}
    </div>
  );
}
function FinTypeMenu({ anchorRef, onPick, onClose }) {
  return (
    <Popover anchorRef={anchorRef} align="right" width={180} onClose={onClose}>
      <div className="menu__label">New column</div>
      {FIN_TYPES.map(t => <button key={t.type} className="menu__item" onClick={() => onPick(t.type)}>{t.label}</button>)}
    </Popover>
  );
}

/* ===================== PageTreeItem ===================== */
function PageTreeItem({ page, depth, ctx }) {
  const store = useStore();
  const children = ctx.childrenOf(page.id);
  const hasChildren = children.length > 0;
  const isExpanded = ctx.expanded.has(page.id);
  const isActive = ctx.currentPageId === page.id;
  const isFav = ctx.favorites.includes(page.id);
  const [menuOpen, setMenuOpen] = useState(false);
  const [renaming, setRenaming] = useState(false);
  const [draft, setDraft] = useState(page.title);
  const menuRef = useRef(null), inputRef = useRef(null);
  useEffect(() => { if (renaming) { inputRef.current && inputRef.current.focus(); inputRef.current && inputRef.current.select(); } }, [renaming]);
  useEffect(() => { if (!menuOpen) return; const onDoc = e => { if (menuRef.current && !menuRef.current.contains(e.target)) setMenuOpen(false); }; document.addEventListener("mousedown", onDoc); return () => document.removeEventListener("mousedown", onDoc); }, [menuOpen]);
  const commitRename = () => { store.renamePage(page.id, draft.trim() || "Untitled"); setRenaming(false); };
  return (
    <div className="tree__node">
      <div className={`tree__row ${isActive ? "is-active" : ""}`} style={{ paddingLeft: 8 + depth * 16 }} onClick={() => !renaming && ctx.onSelect(page.id)}>
        <button className={`tree__caret ${hasChildren ? "" : "is-hidden"} ${isExpanded ? "is-open" : ""}`} onClick={e => { e.stopPropagation(); ctx.toggleExpand(page.id); }} aria-label={isExpanded ? "Collapse" : "Expand"}>▸</button>
        <span className="tree__emoji">{page.emoji}</span>
        {renaming ? (
          <input ref={inputRef} className="tree__rename" value={draft} onClick={e => e.stopPropagation()} onChange={e => setDraft(e.target.value)} onBlur={commitRename}
            onKeyDown={e => { if (e.key === "Enter") commitRename(); if (e.key === "Escape") { setDraft(page.title); setRenaming(false); } }} />
        ) : (<span className="tree__title">{page.title || "Untitled"}</span>)}
        <div className="tree__actions" onClick={e => e.stopPropagation()}>
          <button className="tree__action" title="Add a page inside" onClick={() => { const id = store.createPage(page.id); if (!ctx.expanded.has(page.id)) ctx.toggleExpand(page.id); ctx.onSelect(id); }}>＋</button>
          <div className="tree__menu-wrap" ref={menuRef}>
            <button className="tree__action" title="More" onClick={() => setMenuOpen(v => !v)}>⋯</button>
            {menuOpen && (
              <div className="menu tree__menu">
                <button className="menu__item" onClick={() => { setDraft(page.title); setRenaming(true); setMenuOpen(false); }}>Rename</button>
                <button className="menu__item" onClick={() => { store.duplicatePage(page.id); setMenuOpen(false); }}>Duplicate</button>
                <button className="menu__item" onClick={() => { store.toggleFavorite(page.id); setMenuOpen(false); }}>{isFav ? "Remove from favorites" : "Add to favorites"}</button>
                <div className="menu__sep" />
                <button className="menu__item menu__item--danger" onClick={() => { store.deletePage(page.id); setMenuOpen(false); }}>Delete</button>
              </div>
            )}
          </div>
        </div>
      </div>
      {hasChildren && isExpanded && <div className="tree__children">{children.map(child => <PageTreeItem key={child.id} page={child} depth={depth + 1} ctx={ctx} />)}</div>}
    </div>
  );
}

/* ===================== Sidebar ===================== */
function Sidebar({ onOpenSearch, onCloseDrawer, onCollapse }) {
  const store = useStore();
  const { ws, currentPageId } = store;
  const [expandedList, setExpandedList] = useLocalState("expandedPages", []);
  const expanded = new Set(expandedList);
  const toggleExpand = useCallback(id => setExpandedList(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]), [setExpandedList]);
  const childrenOf = useCallback(id => ws.pages.filter(p => p.parentId === id).sort((a, b) => a.createdAt - b.createdAt), [ws.pages]);
  const onSelect = useCallback(id => { store.setCurrentPage(id); onCloseDrawer(); }, [store, onCloseDrawer]);
  const ctx = { childrenOf, currentPageId, expanded, toggleExpand, onSelect, favorites: ws.favorites };
  const rootPages = childrenOf(null);
  const favoritePages = ws.favorites.map(id => ws.pages.find(p => p.id === id)).filter(Boolean);
  const recentPages = ws.recents.map(id => ws.pages.find(p => p.id === id)).filter(Boolean).slice(0, 5);
  return (
    <aside className="sidebar">
      <div className="sidebar__head">
        <div className="sidebar__brand"><span className="sidebar__logo" aria-hidden>T</span><span className="sidebar__brand-name">Tracker</span></div>
        <button className="icon-btn sidebar__collapse" title="Collapse sidebar" onClick={onCollapse}>«</button>
      </div>
      <div className="sidebar__actions">
        <button className="sidebar__btn" onClick={onOpenSearch}><span className="sidebar__btn-icon">🔍</span><span>Search</span><span className="sidebar__kbd">⌘K</span></button>
        <button className="sidebar__btn" onClick={() => { store.createPage(null); onCloseDrawer(); }}><span className="sidebar__btn-icon">＋</span><span>New page</span></button>
      </div>
      <nav className="sidebar__nav">
        {favoritePages.length > 0 && (
          <div className="sidebar__section"><div className="sidebar__section-title">Favorites</div>
            {favoritePages.map(p => <button key={p.id} className={`sidebar__flat ${currentPageId === p.id ? "is-active" : ""}`} onClick={() => onSelect(p.id)}><span className="tree__emoji">{p.emoji}</span><span className="tree__title">{p.title || "Untitled"}</span><span className="sidebar__star">★</span></button>)}
          </div>
        )}
        {recentPages.length > 0 && (
          <div className="sidebar__section"><div className="sidebar__section-title">Recent</div>
            {recentPages.map(p => <button key={p.id} className={`sidebar__flat ${currentPageId === p.id ? "is-active" : ""}`} onClick={() => onSelect(p.id)}><span className="tree__emoji">{p.emoji}</span><span className="tree__title">{p.title || "Untitled"}</span></button>)}
          </div>
        )}
        <div className="sidebar__section"><div className="sidebar__section-title">Pages</div>
          {rootPages.map(p => <PageTreeItem key={p.id} page={p} depth={0} ctx={ctx} />)}
          {rootPages.length === 0 && <div className="sidebar__empty">No pages yet. Create one above.</div>}
        </div>
      </nav>
      <div className="sidebar__foot"><button className="sidebar__foot-btn" onClick={() => { store.createPage(null); onCloseDrawer(); }}>＋ New page</button></div>
    </aside>
  );
}

/* ===================== TopBar ===================== */
function TopBar({ onToggleDrawer, sidebarCollapsed, onExpandSidebar, onImportClick, onResetClick }) {
  const store = useStore();
  const { ws, currentPageId } = store;
  const [menuOpen, setMenuOpen] = useState(false);
  const menuRef = useRef(null);
  useEffect(() => { if (!menuOpen) return; const onDoc = e => { if (menuRef.current && !menuRef.current.contains(e.target)) setMenuOpen(false); }; document.addEventListener("mousedown", onDoc); return () => document.removeEventListener("mousedown", onDoc); }, [menuOpen]);
  const chain = [];
  let cursor = ws.pages.find(p => p.id === currentPageId) || null;
  const guard = new Set();
  while (cursor && !guard.has(cursor.id)) { guard.add(cursor.id); chain.unshift(cursor); cursor = cursor.parentId ? ws.pages.find(p => p.id === cursor.parentId) || null : null; }
  const current = chain[chain.length - 1];
  const isFav = current ? ws.favorites.includes(current.id) : false;
  const theme = ws.settings.theme;
  return (
    <header className="topbar">
      <div className="topbar__left">
        <button className="icon-btn topbar__menu" onClick={onToggleDrawer} aria-label="Open menu">☰</button>
        {sidebarCollapsed && <button className="icon-btn topbar__expand" onClick={onExpandSidebar} title="Show sidebar">»</button>}
        <nav className="breadcrumb">
          {chain.length === 0 && <span className="breadcrumb__item">Tracker</span>}
          {chain.map((p, i) => (
            <span className="breadcrumb__seg" key={p.id}>
              {i > 0 && <span className="breadcrumb__sep">/</span>}
              <button className="breadcrumb__item" onClick={() => store.setCurrentPage(p.id)}><span className="breadcrumb__emoji">{p.emoji}</span>{p.title || "Untitled"}</button>
            </span>
          ))}
        </nav>
      </div>
      <div className="topbar__right">
        {current && <button className={`icon-btn topbar__fav ${isFav ? "is-fav" : ""}`} title={isFav ? "Remove from favorites" : "Add to favorites"} onClick={() => store.toggleFavorite(current.id)}>{isFav ? "★" : "☆"}</button>}
        <button className="icon-btn" title="Toggle theme" onClick={() => store.setTheme(theme === "light" ? "dark" : "light")}>{theme === "light" ? "🌙" : "☀️"}</button>
        <div className="topbar__menu-wrap" ref={menuRef}>
          <button className="icon-btn" title="Workspace menu" onClick={() => setMenuOpen(v => !v)}>⋯</button>
          {menuOpen && (
            <div className="menu topbar__dropdown">
              <div className="menu__label">Workspace</div>
              <button className="menu__item" onClick={() => { store.exportNow(); setMenuOpen(false); }}>Export JSON</button>
              <button className="menu__item" onClick={() => { onImportClick(); setMenuOpen(false); }}>Import JSON</button>
              <div className="menu__sep" />
              <button className="menu__item menu__item--danger" onClick={() => { onResetClick(); setMenuOpen(false); }}>Reset workspace</button>
            </div>
          )}
        </div>
      </div>
    </header>
  );
}

/* ===================== SearchModal ===================== */
function SearchModal({ open, onClose }) {
  const store = useStore();
  const { ws } = store;
  const [query, setQuery] = useState("");
  const [active, setActive] = useState(0);
  const inputRef = useRef(null), listRef = useRef(null);
  useEffect(() => { if (open) { setQuery(""); setActive(0); setTimeout(() => inputRef.current && inputRef.current.focus(), 0); } }, [open]);
  const pageOfWorkflow = useMemo(() => { const m = new Map(); ws.blocks.forEach(b => { if (b.type === "workflow" && b.props.workflowId) m.set(b.props.workflowId, b.pageId); }); return m; }, [ws.blocks]);
  const pageOfDatabase = useMemo(() => { const m = new Map(); ws.blocks.forEach(b => { if (b.type === "database" && b.props.databaseId) m.set(b.props.databaseId, b.pageId); }); return m; }, [ws.blocks]);
  const results = useMemo(() => {
    const q = query.trim();
    if (!q) return ws.recents.map(id => ws.pages.find(p => p.id === id)).filter(Boolean).slice(0, 6).map(p => ({ id: p.id, kind: "Page", icon: p.emoji, title: p.title || "Untitled", subtitle: "Recent", pageId: p.id }));
    const out = [];
    ws.pages.forEach(p => { if (matches(p.title, q)) out.push({ id: p.id, kind: "Page", icon: p.emoji, title: p.title || "Untitled", subtitle: "Page", pageId: p.id }); });
    ws.blocks.forEach(b => { if (b.content && matches(b.content, q) && b.type !== "database" && b.type !== "workflow") { const page = ws.pages.find(p => p.id === b.pageId); out.push({ id: b.id, kind: "Block", icon: "¶", title: b.content.slice(0, 80), subtitle: `in ${page ? page.title : "page"}`, pageId: b.pageId }); } });
    ws.workflows.forEach(w => { if (matches(w.name, q)) out.push({ id: w.id, kind: "Workflow", icon: "▤", title: w.name, subtitle: "Workflow", pageId: pageOfWorkflow.get(w.id) ?? null }); });
    ws.workflowCards.forEach(c => { if (matches(c.title, q) || matches(c.description, q) || matches(c.tags.join(" "), q)) out.push({ id: c.id, kind: "Card", icon: "▢", title: c.title, subtitle: "Card", pageId: pageOfWorkflow.get(c.workflowId) ?? null }); });
    ws.databaseRows.forEach(r => { const text = Object.values(r.cells).map(v => Array.isArray(v) ? v.join(" ") : String(v ?? "")).join(" "); if (matches(text, q)) { const db = ws.databases.find(d => d.id === r.databaseId); out.push({ id: r.id, kind: "Row", icon: "▦", title: text.trim().slice(0, 80) || "(empty row)", subtitle: `in ${db ? db.name : "table"}`, pageId: pageOfDatabase.get(r.databaseId) ?? null }); } });
    return out.slice(0, 40);
  }, [query, ws, pageOfWorkflow, pageOfDatabase]);
  useEffect(() => setActive(0), [query]);
  const choose = r => { if (!r) return; if (r.pageId) store.setCurrentPage(r.pageId); onClose(); };
  useEffect(() => {
    if (!open) return;
    const onKey = e => {
      if (e.key === "ArrowDown") { e.preventDefault(); setActive(a => Math.min(a + 1, Math.max(0, results.length - 1))); }
      else if (e.key === "ArrowUp") { e.preventDefault(); setActive(a => Math.max(a - 1, 0)); }
      else if (e.key === "Enter") { e.preventDefault(); choose(results[active]); }
      else if (e.key === "Escape") { e.preventDefault(); onClose(); }
    };
    window.addEventListener("keydown", onKey, true);
    return () => window.removeEventListener("keydown", onKey, true);
  }, [open, results, active]);
  useEffect(() => { const el = listRef.current && listRef.current.querySelector(`[data-idx="${active}"]`); el && el.scrollIntoView({ block: "nearest" }); }, [active]);
  if (!open) return null;
  const groups = [];
  results.forEach((r, idx) => { let g = groups.find(x => x.kind === r.kind); if (!g) { g = { kind: r.kind, items: [] }; groups.push(g); } g.items.push({ r, idx }); });
  return (
    <div className="overlay overlay--top" onMouseDown={onClose}>
      <div className="search" onMouseDown={e => e.stopPropagation()} role="dialog" aria-modal="true">
        <div className="search__input-row">
          <span className="search__icon">🔍</span>
          <input ref={inputRef} className="search__input" placeholder="Search pages, blocks, workflows, cards…" value={query} onChange={e => setQuery(e.target.value)} />
          <span className="search__esc">Esc</span>
        </div>
        <div className="search__results" ref={listRef}>
          {results.length === 0 && <div className="search__empty">No results found.</div>}
          {groups.map(g => (
            <div className="search__group" key={g.kind}>
              <div className="search__group-label">{g.kind}</div>
              {g.items.map(({ r, idx }) => (
                <button key={r.kind + r.id} data-idx={idx} className={`search__result ${idx === active ? "is-active" : ""}`} onMouseEnter={() => setActive(idx)} onClick={() => choose(r)}>
                  <span className="search__result-icon">{r.icon}</span>
                  <span className="search__result-text"><span className="search__result-title">{r.title}</span><span className="search__result-sub">{r.subtitle}</span></span>
                  {!r.pageId && <span className="search__result-warn">no page</span>}
                </button>
              ))}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ===================== App ===================== */
function App() {
  const store = useStore();
  const toast = useToast();
  const [searchOpen, setSearchOpen] = useState(false);
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [collapsed, setCollapsed] = useLocalState("sidebarCollapsed", false);
  const [pendingImport, setPendingImport] = useState(null);
  const [resetOpen, setResetOpen] = useState(false);
  const fileRef = useRef(null);
  useEffect(() => { document.documentElement.dataset.theme = store.ws.settings.theme; }, [store.ws.settings.theme]);
  useHotkeys({
    onSearch: () => setSearchOpen(true),
    onSave: () => { store.saveNow(); toast.show("Saved"); },
    onEscape: () => setDrawerOpen(false),
    onNewPage: () => { store.createPage(null); toast.show("Page created"); },
  });
  const handleImportClick = useCallback(() => fileRef.current && fileRef.current.click(), []);
  const handleFile = useCallback(async e => {
    const file = e.target.files && e.target.files[0]; e.target.value = "";
    if (!file) return;
    const res = await importWorkspaceFile(file);
    if (res.ok && res.workspace) setPendingImport(res.workspace);
    else toast.show(res.error || "Import failed", "error");
  }, [toast]);
  const currentPage = store.ws.pages.find(p => p.id === store.currentPageId) || null;
  return (
    <div className={`app ${collapsed ? "app--collapsed" : ""} ${drawerOpen ? "app--drawer-open" : ""}`}>
      <div className="app__sidebar"><Sidebar onOpenSearch={() => setSearchOpen(true)} onCloseDrawer={() => setDrawerOpen(false)} onCollapse={() => setCollapsed(true)} /></div>
      {drawerOpen && <div className="app__scrim" onClick={() => setDrawerOpen(false)} />}
      <div className="app__main">
        <TopBar onToggleDrawer={() => setDrawerOpen(v => !v)} sidebarCollapsed={collapsed} onExpandSidebar={() => setCollapsed(false)} onImportClick={handleImportClick} onResetClick={() => setResetOpen(true)} />
        <main className="app__content">
          {currentPage ? <Editor key={currentPage.id} page={currentPage} /> : (
            <div className="app__no-page"><h2>No page open</h2><p>Create a page from the sidebar to get started.</p><button className="btn btn--primary" onClick={() => store.createPage(null)}>＋ New page</button></div>
          )}
        </main>
      </div>
      <SearchModal open={searchOpen} onClose={() => setSearchOpen(false)} />
      <ConfirmModal open={pendingImport !== null} title="Replace workspace?" message="Importing will replace your current workspace. This can't be undone — consider exporting first." confirmLabel="Import & replace" destructive
        onCancel={() => setPendingImport(null)} onConfirm={() => { if (pendingImport) { store.replaceWorkspace(pendingImport); toast.show("Workspace imported"); } setPendingImport(null); }} />
      <ConfirmModal open={resetOpen} title="Reset workspace?" message="This clears everything and restores the starter workspace. This can't be undone." confirmLabel="Reset" destructive
        onCancel={() => setResetOpen(false)} onConfirm={() => { store.resetWorkspace(); setResetOpen(false); toast.show("Workspace reset"); }} />
      <input ref={fileRef} type="file" accept="application/json,.json" style={{ display: "none" }} onChange={handleFile} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <StrictMode><ToastProvider><WorkspaceProvider><App /></WorkspaceProvider></ToastProvider></StrictMode>
);
    </script>
  </body>
